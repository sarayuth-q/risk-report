<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แจ้งจุดเสี่ยง | Risk Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14; --surface: #161920; --surface2: #1e2230; --border: #2a2f3d;
    --accent: #ff5c3a; --text: #e8eaf0; --text2: #8b90a0; --green: #2dd98f;
    --red: #ff4444; --yellow: #ffb830; --font: 'IBM Plex Sans Thai', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); line-height: 1.6; padding: 20px 10px; }
  .container { max-width: 600px; margin: 0 auto; background: var(--surface); border-radius: 12px; padding: 25px; border: 1px solid var(--border); }
  h1 { font-size: 20px; margin-bottom: 20px; color: var(--accent); text-align: center; }
  .field { margin-bottom: 15px; }
  label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 5px; }
  input, select, textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: var(--text); outline: none; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .upload-box { border: 2px dashed var(--border); padding: 20px; text-align: center; border-radius: 10px; cursor: pointer; margin: 15px 0; }
  .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; margin-top: 10px; }
  .preview-item { position: relative; aspect-ratio: 1; border-radius: 8px; overflow: hidden; }
  .preview-item img { width: 100%; height: 100%; object-fit: cover; }
  .submit-btn { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .success-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; flex-direction: column; }
  .success-overlay.show { display: flex; }
  .error-msg { color: var(--red); font-size: 11px; display: none; }
</style>
</head>
<body>

<div class="container">
  <h1>📤 ส่งรายงานจุดเสี่ยง</h1>
  <form id="riskForm">
    <div class="field">
      <label>ชื่อผู้แจ้ง *</label>
      <input type="text" id="reporter-name" required>
    </div>
    <div class="grid">
      <div class="field">
        <label>หน่วยงาน *</label>
        <select id="dept" required>
          <option value="">เลือกแผนก</option>
          <option>ฝ่ายผลิต</option><option>วิศวกรรม</option><option>ซ่อมบำรุง</option>
        </select>
      </div>
      <div class="field">
        <label>พื้นที่ *</label>
        <select id="area" required>
          <option value="">เลือกพื้นที่</option>
          <option>โรงงาน A</option><option>โรงงาน B</option><option>คลังสินค้า</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>เครื่องจักร (ถ้ามี)</label>
      <input type="text" id="machine">
    </div>
    <div class="grid">
      <div class="field">
        <label>ประเภทความเสี่ยง *</label>
        <select id="riskType" required>
          <option value="ความปลอดภัย">ความปลอดภัย</option>
          <option value="เครื่องจักร">เครื่องจักร</option>
          <option value="อื่นๆ">อื่นๆ</option>
        </select>
      </div>
      <div class="field">
        <label>ระดับความรุนแรง *</label>
        <select id="severity" required>
          <option value="ต่ำ">ต่ำ</option><option value="ปานกลาง" selected>ปานกลาง</option>
          <option value="สูง">สูง</option><option value="วิกฤต">วิกฤต</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>ภาพหลักฐาน (สูงสุด 5 ภาพ)</label>
      <div class="upload-box" onclick="document.getElementById('fileInput').click()">
        <span>📸 คลิกเพื่อเลือกรูปภาพ</span>
        <input type="file" id="fileInput" accept="image/*" multiple style="display:none">
      </div>
      <div class="preview-grid" id="previewGrid"></div>
    </div>
    <div class="field">
      <label>หมายเหตุ</label>
      <textarea id="note" rows="3"></textarea>
    </div>
    <button type="submit" class="submit-btn" id="submitBtn">ส่งข้อมูลรายงาน</button>
  </form>
</div>

<div class="success-overlay" id="successOverlay">
  <h2 style="color:var(--green)">✓ บันทึกสำเร็จ</h2>
  <p style="margin: 10px 0">ข้อมูลและรูปภาพถูกส่งแล้ว</p>
  <button onclick="location.reload()" style="padding:10px 20px; cursor:pointer">ส่งรายงานใหม่</button>
</div>

<script>
  // *** วาง URL ของ Apps Script ของคุณที่นี่ ***
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx0a7DJ2KRMxc-8_x6Dizy5tV3TESrapaP0M7JrFptZE8JyLxrBndc46_-SRPvzMaGH/exec';

  let imageFiles = [];

  document.getElementById('fileInput').addEventListener('change', function(e) {
    const files = Array.from(e.target.files);
    files.slice(0, 5 - imageFiles.length).forEach(file => {
      imageFiles.push(file);
    });
    renderPreviews();
  });

  function renderPreviews() {
    const grid = document.getElementById('previewGrid');
    grid.innerHTML = '';
    imageFiles.forEach((file, i) => {
      const div = document.createElement('div');
      div.className = 'preview-item';
      const img = document.createElement('img');
      img.src = URL.createObjectURL(file);
      const btn = document.createElement('button');
      btn.innerHTML = '×';
      btn.style = "position:absolute;top:2px;right:2px;background:red;color:white;border:none;border-radius:50%;cursor:pointer;width:20px;height:20px;";
      btn.onclick = (e) => { e.preventDefault(); imageFiles.splice(i, 1); renderPreviews(); };
      div.append(img, btn);
      grid.append(div);
    });
  }

  document.getElementById('riskForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerText = 'กำลังส่งข้อมูล...';

    const payload = {
      timestamp: new Date().toLocaleString('th-TH'),
      reporter: document.getElementById('reporter-name').value,
      dept: document.getElementById('dept').value,
      area: document.getElementById('area').value,
      machine: document.getElementById('machine').value || '-',
      riskType: document.getElementById('riskType').value,
      severity: document.getElementById('severity').value,
      note: document.getElementById('note').value || '-',
      imageCount: imageFiles.length
    };
    // ตรวจสอบส่วนนี้ในไฟล์ index.html ของคุณ
    const formData = new FormData();
    formData.append('data', JSON.stringify(payload));
    imageFiles.forEach((f, i) => {
      formData.append('image_' + i, f.blob); // ส่ง f.blob โดยตรง
    });
    const formData = new FormData();
    formData.append('data', JSON.stringify(payload));
    imageFiles.forEach((file, i) => {
      formData.append('image_' + i, file);
    });

    try {
      const response = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: formData // ห้ามมี mode: 'no-cors'
      });
      const result = await response.json();
      if (result.status === 'ok') {
        document.getElementById('successOverlay').classList.add('show');
      } else {
        throw new Error(result.message);
      }
    } catch (err) {
      alert('เกิดข้อผิดพลาด: ' + err.message);
      btn.disabled = false;
      btn.innerText = 'ส่งข้อมูลรายงาน';
    }
  });
</script>
</body>
</html>
