<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>รายงานจุดเสี่ยง โรงงานอาหารสัตว์ศรีราชา</title>

<style>

*{
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  margin:0;
  min-height:100vh;
  background:linear-gradient(135deg,#043b3b,#021414,#000000);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.container{
  width:100%;
  max-width:700px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  border-radius:25px;
  padding:30px;
  box-shadow:0 0 30px rgba(0,0,0,0.5);
}

h1{
  text-align:center;
  margin-bottom:30px;
  font-size:2rem;
  color:#8fffe0;
}

.form-group{
  margin-bottom:22px;
}

label{
  display:block;
  margin-bottom:8px;
  font-size:1.1rem;
  font-weight:bold;
}

input,
select,
textarea{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  font-size:1rem;
  background:#ffffff;
  color:#000;
}

textarea{
  min-height:120px;
  resize:vertical;
}

input[type=file]{
  background:#ffffff22;
  color:white;
}

button{
  width:100%;
  padding:18px;
  border:none;
  border-radius:15px;
  font-size:1.2rem;
  font-weight:bold;
  cursor:pointer;
  background:linear-gradient(90deg,#00b894,#00cec9);
  color:white;
  transition:0.3s;
}

button:hover{
  transform:scale(1.02);
}

#status{
  margin-top:20px;
  text-align:center;
  font-size:1rem;
  color:#8fffe0;
}

@media(max-width:600px){

  h1{
    font-size:1.5rem;
  }

  input,
  select,
  textarea{
    font-size:1rem;
  }

}

</style>

</head>

<body>

<div class="container">

<h1>รายงานจุดเสี่ยง โรงงานอาหารสัตว์ศรีราชา</h1>

<div class="form-group">
<label>หน่วยงาน</label>
<select id="department" required></select>
</div>

<div class="form-group">
<label>ชื่อพนักงาน</label>
<select id="employee" required></select>
</div>

<div class="form-group">
<label>จุดพบความเสี่ยง</label>
<textarea id="location"
placeholder="แจ้งสถานที่หรือจุดเสี่ยง"
required></textarea>
</div>

<div class="form-group">
<label>ประเภทความเสี่ยง</label>
<select id="riskType" required></select>
</div>

<div class="form-group">
<label>ระดับความเสี่ยง</label>
<select id="riskLevel" required></select>
</div>

<div class="form-group">
<label>แนบรูปภาพ</label>
<input type="file" id="images" multiple accept="image/*" required>
</div>

<div class="form-group">
<label>หมายเหตุ</label>
<textarea id="note"></textarea>
</div>

<button onclick="submitForm()">บันทึกข้อมูล</button>

<div id="status"></div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxjbF0fTWnBzDWGAJLgzw7yfqOanxzcO_WBgxt067JUnwCFS3is6kGnRj6RB2sePGHM/exec";

let masterData = {};
let selectedEmpId = "";

async function loadMasterData(){

  const response = await fetch(API_URL + "?action=master");
  masterData = await response.json();

  loadDepartments();
  loadRiskTypes();
  loadRiskLevels();
}

function loadDepartments(){

  const dept = document.getElementById("department");

  dept.innerHTML = '<option value="">เลือกหน่วยงาน</option>';

  masterData.departments.forEach(d=>{

    dept.innerHTML += `<option value="${d}">${d}</option>`;

  });

  dept.addEventListener("change",loadEmployees);
}

function loadEmployees(){

  const dept = document.getElementById("department").value;
  const emp = document.getElementById("employee");

  emp.innerHTML = '<option value="">เลือกพนักงาน</option>';

  const filtered = masterData.staffs.filter(
    s=>s.department===dept
  );

  filtered.forEach(s=>{

    emp.innerHTML += `
      <option value="${s.name}"
      data-id="${s.empId}">
      ${s.name}
      </option>
    `;

  });

  emp.addEventListener("change",()=>{

    const selected =
      emp.options[emp.selectedIndex];

    selectedEmpId =
      selected.getAttribute("data-id");

  });
}

function loadRiskTypes(){

  const risk = document.getElementById("riskType");

  risk.innerHTML =
    '<option value="">เลือกประเภท</option>';

  masterData.riskTypes.forEach(r=>{

    risk.innerHTML +=
      `<option value="${r}">${r}</option>`;

  });
}

function loadRiskLevels(){

  const risk = document.getElementById("riskLevel");

  risk.innerHTML =
    '<option value="">เลือกระดับ</option>';

  masterData.riskLevels.forEach(r=>{

    risk.innerHTML +=
      `<option value="${r}">${r}</option>`;

  });
}

function generateImageId(){

  const now = new Date();

  const dd = String(now.getDate()).padStart(2,'0');
  const mm = String(now.getMonth()+1).padStart(2,'0');
  const yy = String(now.getFullYear()).slice(-2);

  return selectedEmpId + dd + mm + yy;
}

async function compressImage(file){

  return new Promise((resolve)=>{

    const img = new Image();
    const reader = new FileReader();

    reader.onload = e=>{

      img.src = e.target.result;

    };

    img.onload = ()=>{

      const canvas = document.createElement('canvas');

      let width = img.width;
      let height = img.height;

      const maxWidth = 1600;

      if(width > maxWidth){

        height *= maxWidth / width;
        width = maxWidth;

      }

      canvas.width = width;
      canvas.height = height;

      const ctx = canvas.getContext('2d');

      ctx.drawImage(img,0,0,width,height);

      canvas.toBlob(blob=>{

        resolve(blob);

      },'image/jpeg',0.8);

    };

    reader.readAsDataURL(file);

  });
}

async function submitForm(){

  const status = document.getElementById("status");

  const images =
    document.getElementById("images").files;

  if(images.length===0){

    alert("กรุณาแนบรูป");
    return;

  }

  status.innerHTML = "กำลังบันทึกข้อมูล...";

  const imageId = generateImageId();

  const payload = {

    reporter:
      document.getElementById("employee").value,

    department:
      document.getElementById("department").value,

    location:
      document.getElementById("location").value,

    riskLevel:
      document.getElementById("riskLevel").value,

    note:
      document.getElementById("note").value,

    totalImages: images.length,

    imageId: imageId

  };

  google.script.run
    .withSuccessHandler(async(res)=>{

      const rowNumber = res.rowNumber;

      for(let i=0;i<images.length;i++){

        status.innerHTML =
          `กำลังอัปโหลดรูป ${i+1}/${images.length}`;

        const compressed =
          await compressImage(images[i]);

        const base64 =
          await blobToBase64(compressed);

        await uploadChunk(
          base64,
          images[i].name,
          compressed.type,
          rowNumber
        );
      }

      status.innerHTML =
        "✅ บันทึกข้อมูลสำเร็จ";

      document
        .querySelector("form")
        ?.reset();

    })
    .saveForm(payload);
}

function blobToBase64(blob){

  return new Promise((resolve)=>{

    const reader = new FileReader();

    reader.onloadend = ()=>{

      resolve(reader.result.split(',')[1]);

    };

    reader.readAsDataURL(blob);

  });
}

async function uploadChunk(
  base64,
  fileName,
  mimeType,
  rowNumber
){

  return new Promise((resolve,reject)=>{

    google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(reject)
      .uploadImageChunk({

        base64,
        fileName,
        mimeType,
        rowNumber

      });

  });
}

loadMasterData();

</script>

</body>
</html>
