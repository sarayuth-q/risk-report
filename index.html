<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ระบบรายงานและสรุปจุดเสี่ยง โรงงานอาหารสัตว์ศรีราชา</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --clr-bg: #060d1a;
            --clr-surface: rgba(255,255,255,0.06);
            --clr-border: rgba(255,255,255,0.12);
            --clr-accent: #00d4aa;
            --clr-accent2: #0ea5e9;
            --clr-text: #e8f0fe;
            --clr-muted: #94a3b8;
            --clr-green: #10b981;
            --clr-yellow: #f59e0b;
            --clr-red: #ef4444;
            --radius: 24px;
            --radius-sm: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Noto Sans Thai', sans-serif;
            min-height: 100vh;
            background: var(--clr-bg);
            background-image: radial-gradient(circle at 10% 20%, rgba(0,212,170,0.08) 0%, transparent 50%),
                              radial-gradient(circle at 90% 80%, rgba(14,165,233,0.08) 0%, transparent 50%);
            padding: 30px 20px 80px;
            color: var(--clr-text);
            display: flex; justify-content: center; align-items: flex-start;
        }
        .container {
            width: 100%; max-width: 950px;
            background: var(--clr-surface); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius); padding: 45px 40px; border: 1px solid var(--clr-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .view { display: none; animation: fadeIn 0.4s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* ============ HOME PAGE ============ */
        .home-header { display: flex; flex-direction: column; align-items: center; padding-bottom: 40px; }
        .helmet-wrap { width: 150px; height: 150px; margin-bottom: 25px; }
        .helmet-wrap svg { width: 100%; height: 100%; filter: drop-shadow(0 0 20px rgba(0,212,170,0.3)); }
        .home-title h1 { font-size: 2.5rem; font-weight: 700; color: var(--clr-accent); line-height: 1.3; text-align: center; }
        .home-title p { font-size: 1.4rem; color: var(--clr-muted); text-align: center; margin-top: 10px; }
        .home-divider { width: 100px; height: 5px; background: linear-gradient(90deg, var(--clr-accent), var(--clr-accent2)); border-radius: 99px; margin: 25px auto; }
        .home-btns { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 500px; margin: 0 auto; }

        /* ============ UI ELEMENTS ============ */
        h2 { font-size: 2rem; color: var(--clr-accent); margin-bottom: 30px; text-align: center; font-weight: 700; }
        label { display: block; margin-bottom: 10px; font-size: 1.2rem; font-weight: 600; color: var(--clr-accent); }
        input, select, textarea {
            width: 100%; padding: 18px; border: 2px solid var(--clr-border); border-radius: var(--radius-sm);
            font-size: 1.2rem; background: rgba(255,255,255,0.05); color: var(--clr-text); outline: none; transition: 0.3s;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--clr-accent); background: rgba(0,212,170,0.05); }
        button {
            width: 100%; padding: 20px; border: none; border-radius: 16px; font-size: 1.4rem; font-weight: 700;
            cursor: pointer; transition: 0.3s; margin-bottom: 15px;
        }
        .btn-primary { background: linear-gradient(135deg, var(--clr-accent), var(--clr-accent2)); color: #060d1a; box-shadow: 0 10px 20px rgba(0,212,170,0.2); }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,212,170,0.4); }
        .btn-secondary { background: rgba(255,255,255,0.08); border: 1px solid var(--clr-border); color: white; }
        .btn-danger { background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5; }

        /* ============ DASHBOARD ============ */
        .filter-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 35px; }
        .kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 40px; }
        .kpi-card { background: rgba(0,0,0,0.3); border: 1px solid var(--clr-border); padding: 25px; border-radius: 20px; text-align: center; }
        .kpi-title { font-size: 1.1rem; color: var(--clr-muted); margin-bottom: 10px; }
        .kpi-value { font-size: 2.8rem; font-weight: 800; color: white; }
        
        .chart-row { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; margin-bottom: 30px; }
        .chart-box { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 25px; border: 1px solid var(--clr-border); }
        
        .toggle-wrap { display: flex; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 18px; margin-bottom: 30px; }
        .tab-btn { flex: 1; padding: 15px; border: none; border-radius: 12px; background: transparent; color: var(--clr-muted); font-size: 1.2rem; font-weight: 600; cursor: pointer; transition: 0.3s; margin: 0;}
        .tab-btn.active { background: var(--clr-accent); color: #060d1a; }

        .table-container { background: white; border-radius: 20px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; color: #1e293b; font-size: 1.2rem; }
        th, td { padding: 20px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #0f172a; color: white; }
        .status-badge { padding: 6px 15px; border-radius: 99px; font-weight: 700; font-size: 1rem; }
        .status-pass { background: #dcfce7; color: #166534; }
        .status-fail { background: #fef3c7; color: #92400e; }

        /* ============ MODAL & LIGHTBOX ============ */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 1000; justify-content: center; align-items: center; padding: 30px; }
        .modal-content { background: #0a192f; border: 1px solid var(--clr-border); border-radius: 24px; padding: 40px; width: 100%; max-width: 850px; max-height: 85vh; overflow-y: auto; position: relative; }
        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 2rem; cursor: pointer; color: white; background: rgba(255,255,255,0.1); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        
        .case-card { background: rgba(255,255,255,0.05); border-radius: 18px; padding: 25px; margin-bottom: 20px; }
        .case-gallery { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 20px; }
        .case-gallery img { width: 140px; height: 140px; object-fit: cover; border-radius: 15px; border: 2px solid var(--clr-accent2); cursor: pointer; }

        /* Lightbox for Image Zoom */
        #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; cursor: zoom-out; }
        #lightbox img { max-width: 90%; max-height: 90%; border-radius: 10px; box-shadow: 0 0 50px rgba(0,0,0,0.8); }

        @media (max-width: 800px) {
            .filter-grid, .kpi-grid, .chart-row { grid-template-columns: 1fr; }
            .home-title h1 { font-size: 2rem; }
            .container { padding: 30px 20px; }
        }
    </style>
</head>
<body>

<div id="lightbox" onclick="this.style.display='none'">
    <img id="lightboxImg" src="">
</div>

<div class="container">

    <div id="viewHome" class="view active">
        <div class="home-header">
            <div class="helmet-wrap">
                <svg viewBox="0 0 110 110" xmlns="http://www.w3.org/2000/svg">
                    <path d="M55 15 C30 15, 12 34, 12 56 L12 66 L98 66 L98 56 C98 34, 80 15, 55 15 Z" fill="#facc15" />
                    <rect x="5" y="62" width="100" height="9" rx="4.5" fill="#b45309" />
                </svg>
            </div>
            <div class="home-title">
                <h1>ระบบรายงานจุดเสี่ยง<br>โรงงานอาหารสัตว์ศรีราชา</h1>
                <p>Risk Reporting & Monitoring System</p>
                <div class="home-divider"></div>
            </div>
        </div>
        <div class="home-btns">
            <button class="btn-primary" onclick="switchView('viewForm')">🚧 พนักงานส่งจุดเสี่ยง</button>
            <button class="btn-secondary" onclick="switchView('viewLogin')">📊 รายงานสรุปสำหรับผู้บริหาร</button>
        </div>
    </div>

    <div id="viewForm" class="view">
        <h2>ส่งรายงานจุดเสี่ยง</h2>
        <div class="form-group"><label>หน่วยงาน</label><select id="department"><option value="">กำลังโหลด...</option></select></div>
        <div class="form-group"><label>ชื่อพนักงาน</label><select id="employee" disabled><option value="">เลือกพนักงาน</option></select></div>
        <div class="form-group"><label>จุดพบความเสี่ยง</label><textarea id="locationText" placeholder="ระบุสถานที่ที่พบความเสี่ยง"></textarea></div>
        <div class="form-group"><label>ประเภทความเสี่ยง</label><select id="riskType"></select></div>
        <div class="form-group"><label>ระดับความเสี่ยง</label><select id="riskLevelForm"></select></div>
        <div class="form-group"><label>แนบรูปภาพ</label><input type="file" id="images" multiple accept="image/*" /><div class="case-gallery" id="preview"></div></div>
        <div class="form-group"><label>หมายเหตุ</label><textarea id="note"></textarea></div>
        <button id="submitBtn" class="btn-primary">บันทึกข้อมูล</button>
        <button class="btn-secondary" onclick="switchView('viewHome')">ย้อนกลับ</button>
        <div id="status" style="text-align: center; font-size: 1.2rem; color: var(--clr-accent);"></div>
    </div>

    <div id="viewLogin" class="view">
        <h2>เข้าสู่ระบบรายงาน</h2>
        <div class="form-group"><label>ชื่อผู้ใช้งาน</label><input type="text" id="loginUser"></div>
        <div class="form-group"><label>รหัสผ่าน</label><input type="password" id="loginPass"></div>
        <button id="btnLogin" class="btn-primary">เข้าสู่ระบบ</button>
        <button class="btn-secondary" onclick="switchView('viewHome')">ย้อนกลับ</button>
        <div id="loginStatus" style="text-align: center; color: var(--clr-red); margin-top: 15px;"></div>
    </div>

    <div id="viewDashboard" class="view">
        <h2>รายงานสรุปเทียบเป้าหมาย</h2>
        
        <div class="filter-grid">
            <div><label>ปี ค.ศ.</label><select id="dashYear" onchange="renderDashboard()"></select></div>
            <div><label>เดือน</label><select id="dashMonth" onchange="renderDashboard()"><option value="all">รวมทั้งปี</option><option value="1">ม.ค.</option><option value="2">ก.พ.</option><option value="3">มี.ค.</option><option value="4">เม.ย.</option><option value="5">พ.ค.</option><option value="6">มิ.ย.</option><option value="7">ก.ค.</option><option value="8">ส.ค.</option><option value="9">ก.ย.</option><option value="10">ต.ค.</option><option value="11">พ.ย.</option><option value="12">ธ.ค.</option></select></div>
            <div><label>หน่วยงาน</label><select id="dashDept" onchange="renderDashboard()"></select></div>
            <div><label>สถานะรายบุคคล</label><select id="dashStatus" onchange="renderDashboard()"><option value="all">ทั้งหมด</option><option value="pass">ผ่านเกณฑ์</option><option value="fail">ยังไม่ผ่าน</option></select></div>
        </div>

        <div class="kpi-grid">
            <div class="kpi-card"><div class="kpi-title">แจ้งแล้ว (เรื่อง)</div><div class="kpi-value" id="kpiActual">0</div></div>
            <div class="kpi-card"><div class="kpi-title">เป้าโรงงาน</div><div class="kpi-value" id="kpiTarget">0</div></div>
            <div class="kpi-card"><div class="kpi-title">ผ่านเกณฑ์ (คน)</div><div class="kpi-value" id="kpiPass">0</div></div>
            <div class="kpi-card"><div class="kpi-title">อัตราการผ่าน (%)</div><div class="kpi-value" id="kpiPercent">0%</div></div>
        </div>

        <div class="chart-row">
            <div class="chart-box">
                <label style="text-align: center;">สรุปรายหน่วยงาน</label>
                <canvas id="deptChart"></canvas>
            </div>
            <div class="chart-box">
                <label style="text-align: center;">ระดับความเสี่ยง</label>
                <canvas id="riskSummaryChart"></canvas>
            </div>
        </div>

        <div class="toggle-wrap">
            <button class="tab-btn active" id="btnGraph" onclick="toggleDashView('graph')">📊 กราฟเปรียบเทียบ</button>
            <button class="tab-btn" id="btnTable" onclick="toggleDashView('table')">📋 รายชื่อรายบุคคล</button>
        </div>

        <div id="secTable" class="view" style="display: none;">
            <div class="table-container">
                <table>
                    <thead><tr><th>ชื่อพนักงาน</th><th style="text-align: center;">ส่ง / เป้า</th><th style="text-align: center;">สถานะ</th><th>ข้อมูล</th></tr></thead>
                    <tbody id="dashTableBody"></tbody>
                </table>
            </div>
        </div>

        <button class="btn-danger" onclick="switchView('viewHome')" style="margin-top: 30px;">ออกจากระบบ</button>
    </div>
</div>

<div id="caseModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="document.getElementById('caseModal').style.display='none'">×</span>
        <h3 id="modalEmpName" style="color: var(--clr-accent); font-size: 2rem; margin-bottom: 25px;">รายละเอียดการแจ้ง</h3>
        <div id="modalCaseList"></div>
    </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzLR6Y-d3jO1_OBFVAigLByExRlzN_e3NmpQgol_AOelyJvO7r3TxD3kJQPYe0DLqhj/exec";
let masterData = {};
let dashboardData = [];
let dashboardTargets = {};
let deptChartInstance = null;
let riskChartInstance = null;

// ============ UI CORE ============
function switchView(viewId) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(viewId).classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleDashView(mode) {
    document.getElementById('btnGraph').classList.toggle('active', mode === 'graph');
    document.getElementById('btnTable').classList.toggle('active', mode === 'table');
    document.getElementById('secTable').style.display = (mode === 'table' ? 'block' : 'none');
    document.querySelector('.chart-row').style.display = (mode === 'graph' ? 'grid' : 'none');
}

function openLightbox(url) {
    document.getElementById('lightboxImg').src = url;
    document.getElementById('lightbox').style.display = 'flex';
}

// ============ LOAD DATA ============
window.onload = async () => {
    try {
        const res = await fetch(API_URL + "?action=master");
        const data = await res.json();
        if (data.success) {
            masterData = data;
            setupDropdowns();
        }
    } catch(e) { console.error("Master Load Error", e); }
};

function setupDropdowns() {
    const dept = document.getElementById("department");
    masterData.departments.forEach(d => dept.innerHTML += `<option value="${d}">${d}</option>`);
    dept.onchange = () => {
        const emp = document.getElementById("employee");
        emp.innerHTML = '<option value="">เลือกพนักงาน</option>';
        if (!dept.value) { emp.disabled = true; return; }
        emp.disabled = false;
        masterData.staffs.filter(s => s.department === dept.value).forEach(s => 
            emp.innerHTML += `<option value="${s.name}" data-code="${s.code}">${s.name}</option>`);
    };
    
    const riskType = document.getElementById("riskType");
    masterData.riskTypes.forEach(r => riskType.innerHTML += `<option value="${r}">${r}</option>`);
    
    const riskLevel = document.getElementById("riskLevelForm");
    masterData.riskLevels.forEach(r => riskLevel.innerHTML += `<option value="${r}">${r}</option>`);
}

// ============ FORM SUBMISSION ============
document.getElementById("images").onchange = function() {
    const preview = document.getElementById("preview");
    preview.innerHTML = "";
    [...this.files].forEach(file => {
        const reader = new FileReader();
        reader.onload = e => {
            const img = document.createElement("img");
            img.src = e.target.result;
            preview.appendChild(img);
        };
        reader.readAsDataURL(file);
    });
};

document.getElementById("submitBtn").onclick = async function() {
    const btn = this;
    const status = document.getElementById("status");
    btn.disabled = true;
    status.innerHTML = "กำลังบันทึกข้อมูล...";

    try {
        const empSelect = document.getElementById("employee");
        const empName = empSelect.value;
        const empCode = empSelect.options[empSelect.selectedIndex].dataset.code;
        const d = new Date();
        const dateId = String(d.getDate()).padStart(2,'0') + String(d.getMonth()+1).padStart(2,'0') + String(d.getFullYear()).slice(-2);
        const imageId = empCode + dateId;

        // Step 1: Save Text
        const resText = await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({
                action: "saveForm",
                reporter: empName,
                department: document.getElementById("department").value,
                location: document.getElementById("locationText").value,
                riskType: document.getElementById("riskType").value,
                riskLevel: document.getElementById("riskLevelForm").value,
                note: document.getElementById("note").value,
                totalImages: document.getElementById("images").files.length,
                imageId: imageId
            })
        });
        const resultText = await resText.json();
        
        // Step 2: Upload Images
        const files = document.getElementById("images").files;
        for (let i = 0; i < files.length; i++) {
            status.innerHTML = `กำลังส่งรูปที่ ${i+1}/${files.length}...`;
            const base64 = await toBase64(files[i]);
            await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({
                    action: "uploadImage",
                    base64: base64,
                    rowId: resultText.rowId,
                    imageId: imageId,
                    filename: `${imageId}_${i+1}.jpg`
                })
            });
        }
        
        alert("บันทึกสำเร็จ!");
        location.reload();
    } catch(e) { 
        alert("เกิดข้อผิดพลาด"); 
        console.error(e);
    } finally { btn.disabled = false; }
};

function toBase64(file) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result.split(',')[1]);
    });
}

// ============ DASHBOARD & LOGIN ============
document.getElementById("btnLogin").onclick = async function() {
    const user = document.getElementById("loginUser").value;
    const pass = document.getElementById("loginPass").value;
    const btn = this;
    btn.disabled = true;

    try {
        const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "checkLogin", user, pass }) });
        const data = await res.json();
        if (data.success) {
            await loadDashboard();
            switchView('viewDashboard');
        } else {
            document.getElementById("loginStatus").innerHTML = data.message;
        }
    } catch(e) { console.error(e); } finally { btn.disabled = false; }
};

async function loadDashboard() {
    const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "getDashboard" }) });
    const data = await res.json();
    if (data.success) {
        dashboardData = data.records;
        dashboardTargets = data.targets;
        
        // Setup Filters
        const years = [...new Set(dashboardData.map(d => d.year))].sort().reverse();
        const yearSelect = document.getElementById("dashYear");
        yearSelect.innerHTML = "";
        years.forEach(y => yearSelect.innerHTML += `<option value="${y}">${y}</option>`);
        
        const deptSelect = document.getElementById("dashDept");
        deptSelect.innerHTML = '<option value="all">ทุกหน่วยงาน</option>';
        masterData.departments.forEach(d => deptSelect.innerHTML += `<option value="${d}">${d}</option>`);
        
        renderDashboard();
    }
}

function renderDashboard() {
    const selY = document.getElementById("dashYear").value;
    const selM = document.getElementById("dashMonth").value;
    const selD = document.getElementById("dashDept").value;
    const selS = document.getElementById("dashStatus").value;

    const targetPerson = (selM === "all" ? dashboardTargets.personYear : dashboardTargets.personMonth);
    const targetFactory = (selM === "all" ? dashboardTargets.factoryYear : dashboardTargets.factoryMonth);
    
    document.getElementById("kpiTarget").innerText = targetFactory;

    const filtered = dashboardData.filter(d => 
        d.year === selY && 
        (selM === "all" || d.month === selM) &&
        (selD === "all" || d.dept === selD)
    );

    // KPI Calculations
    let actualCount = filtered.length;
    let personStats = {};
    let riskStats = {};
    
    filtered.forEach(d => {
        personStats[d.reporter] = (personStats[d.reporter] || 0) + 1;
        riskStats[d.riskLevel] = (riskStats[d.riskLevel] || 0) + 1;
    });

    let passCount = 0;
    let totalInDept = masterData.staffs.filter(s => selD === "all" || s.department === selD).length;
    
    const tbody = document.getElementById("dashTableBody");
    tbody.innerHTML = "";
    
    masterData.staffs.filter(s => selD === "all" || s.department === selD).forEach(s => {
        let count = personStats[s.name] || 0;
        let isPass = count >= targetPerson;
        if (isPass) passCount++;

        if (selS === 'pass' && !isPass) return;
        if (selS === 'fail' && isPass) return;

        tbody.innerHTML += `<tr>
            <td>${s.name}<br><small style="color: #64748b">${s.department}</small></td>
            <td style="text-align: center;"><b>${count}</b> / ${targetPerson}</td>
            <td style="text-align: center;"><span class="status-badge ${isPass ? 'status-pass' : 'status-fail'}">${isPass ? 'ผ่าน' : 'ยังไม่ผ่าน'}</span></td>
            <td><button class="btn-primary" style="padding: 10px; font-size: 1rem; margin: 0; width: auto;" onclick="viewDetail('${s.name}')">🔍 ดู</button></td>
        </tr>`;
    });

    document.getElementById("kpiActual").innerText = actualCount;
    document.getElementById("kpiPass").innerText = passCount;
    document.getElementById("kpiPercent").innerText = Math.round((passCount / totalInDept) * 100) + "%";

    // Chart: Dept
    updateDeptChart(filtered, targetPerson);
    // Chart: Risk Summary
    updateRiskChart(riskStats);
}

function updateDeptChart(data, target) {
    let deptLabels = masterData.departments;
    let deptCounts = deptLabels.map(dept => data.filter(d => d.dept === dept).length);
    let targetLines = deptLabels.map(dept => {
        let staffCount = masterData.staffs.filter(s => s.department === dept).length;
        return staffCount * target;
    });

    if (deptChartInstance) deptChartInstance.destroy();
    deptChartInstance = new Chart(document.getElementById('deptChart'), {
        type: 'bar',
        data: {
            labels: deptLabels,
            datasets: [
                { label: 'ส่งแล้ว', data: deptCounts, backgroundColor: '#00d4aa' },
                { label: 'เป้าหมาย', data: targetLines, type: 'line', borderColor: '#ef4444', borderDash: [5, 5], fill: false }
            ]
        },
        options: { responsive: true, scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.1)' } } } }
    });
}

function updateRiskChart(stats) {
    const labels = Object.keys(stats);
    const values = Object.values(stats);
    const colors = labels.map(l => l.includes('สูง') ? '#ef4444' : l.includes('กลาง') ? '#f59e0b' : '#10b981');

    if (riskChartInstance) riskChartInstance.destroy();
    riskChartInstance = new Chart(document.getElementById('riskSummaryChart'), {
        type: 'doughnut',
        data: {
            labels: labels,
            datasets: [{ data: values, backgroundColor: colors }]
        },
        options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { color: '#fff' } } } }
    });
}

function viewDetail(name) {
    const selY = document.getElementById("dashYear").value;
    const selM = document.getElementById("dashMonth").value;
    const userCases = dashboardData.filter(d => d.reporter === name && d.year === selY && (selM === 'all' || d.month === selM));
    
    document.getElementById("modalEmpName").innerText = "ประวัติการแจ้งของ: " + name;
    const container = document.getElementById("modalCaseList");
    container.innerHTML = "";

    userCases.forEach(c => {
        let imgs = c.images && c.images.length > 0 ? c.images.map(url => `<img src="${url}" onclick="openLightbox('${url}')">`).join('') : "ไม่มีรูป";
        container.innerHTML += `
            <div class="case-card">
                <div style="display: flex; justify-content: space-between;">
                    <strong style="color: var(--clr-accent)">${c.location}</strong>
                    <span>${c.month}/${c.year}</span>
                </div>
                <p style="margin: 10px 0;">ระดับ: <b>${c.riskLevel}</b> | ประเภท: ${c.riskType}</p>
                <div class="case-gallery">${imgs}</div>
                <p style="margin-top: 10px; font-size: 0.9rem; color: #94a3b8;">${c.note || ''}</p>
            </div>
        `;
    });

    document.getElementById("caseModal").style.display = "flex";
}
</script>
</body>
</html>
