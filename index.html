<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>รายงานจุดเสี่ยง โรงงานอาหารสัตว์ศรีราชา</title>
<style>
  *{ box-sizing:border-box; font-family:'Segoe UI', Tahoma, sans-serif; }
  body{
    margin:0; min-height:100vh;
    background: linear-gradient(135deg, #0f766e, #042424, #000000);
    display:flex; justify-content:center; align-items:center;
    padding:20px; color:white;
  }
  .container{
    width:100%; max-width:720px;
    background: rgba(255,255,255,0.08);
    backdrop-filter:blur(12px); border-radius:24px;
    padding:30px; box-shadow: 0 0 30px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.1);
  }
  h1{ text-align:center; color:#8fffe0; margin-bottom:30px; font-size:2rem; }
  .form-group{ margin-bottom:20px; }
  label{ display:block; margin-bottom:8px; font-size:1.2rem; font-weight:bold; color: #8fffe0; }
  input, select, textarea{
    width:100%; padding:16px; border:none; border-radius:14px;
    font-size:1.1rem; background: rgba(255, 255, 255, 0.95); color: #1a1a1a;
  }
  textarea{ min-height:120px; resize:vertical; }
  button{
    width:100%; padding:18px; border:none; border-radius:14px;
    font-size:1.3rem; font-weight:bold; cursor:pointer;
    background: linear-gradient(90deg, #00c9a7, #00e5ff); color:white;
    transition: 0.3s; box-shadow: 0 4px 15px rgba(0,201,167,0.3);
  }
  button:hover{ transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,201,167,0.5); }
  button:disabled{ opacity:0.6; cursor: not-allowed; }
  .preview{ display:flex; flex-wrap:wrap; gap:10px; margin-top:10px; }
  .preview img{ width:100px; height:100px; object-fit:cover; border-radius:12px; border: 2px solid #00c9a7; }
  #status{ margin-top:20px; text-align:center; font-weight:bold; color:#8fffe0; font-size: 1.1rem; }
</style>
</head>
<body>

<div class="container">
  <h1>รายงานจุดเสี่ยง โรงงานอาหารสัตว์ศรีราชา</h1>

  <div class="form-group">
    <label>หน่วยงาน</label>
    <select id="department"><option value="">กำลังโหลด...</option></select>
  </div>

  <div class="form-group">
    <label>ชื่อพนักงาน</label>
    <select id="employee" disabled><option value="">เลือกพนักงาน</option></select>
  </div>

  <div class="form-group">
    <label>จุดพบความเสี่ยง</label>
    <textarea id="locationText" placeholder="แจ้งสถานที่หรือจุดเสี่ยง"></textarea>
  </div>

  <div class="form-group">
    <label>ประเภทความเสี่ยง</label>
    <select id="riskType"></select>
  </div>

  <div class="form-group">
    <label>ระดับความเสี่ยง</label>
    <select id="riskLevel"></select>
  </div>

  <div class="form-group">
    <label>แนบรูปภาพ</label>
    <input type="file" id="images" multiple accept="image/*" />
    <div class="preview" id="preview"></div>
  </div>

  <div class="form-group">
    <label>หมายเหตุ</label>
    <textarea id="note"></textarea>
  </div>

  <button id="submitBtn">บันทึกข้อมูล</button>
  <div id="status"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyUQr0FXIPkshbY3ir6r7Gab3erAJ0DThGJkGLFYjJ_JViSHR1E7DIt2r_tRF-vy66B/exec";
let masterData = {};
let selectedEmpId = "";

async function loadMasterData(){
  try {
    const response = await fetch(API_URL + "?action=master");
    const data = await response.json();
    if(!data.success) { alert("โหลดข้อมูลไม่สำเร็จ"); return; }
    masterData = data;
    loadDropdowns();
  } catch(err){ alert("ไม่สามารถโหลดข้อมูลได้"); }
}

function loadDropdowns(){
  const dept = document.getElementById("department");
  dept.innerHTML = '<option value="">เลือกหน่วยงาน</option>';
  masterData.departments.forEach(d => { dept.innerHTML += `<option value="${d}">${d}</option>`; });
  dept.addEventListener("change", loadEmployees);

  const riskT = document.getElementById("riskType");
  riskT.innerHTML = '<option value="">เลือกประเภท</option>';
  masterData.riskTypes.forEach(r => { riskT.innerHTML += `<option value="${r}">${r}</option>`; });

  const riskL = document.getElementById("riskLevel");
  riskL.innerHTML = '<option value="">เลือกระดับ</option>';
  masterData.riskLevels.forEach(r => { riskL.innerHTML += `<option value="${r}">${r}</option>`; });
}

function loadEmployees(){
  const deptVal = document.getElementById("department").value;
  const emp = document.getElementById("employee");
  emp.innerHTML = '<option value="">เลือกพนักงาน</option>';
  if(!deptVal) { emp.disabled = true; return; }
  emp.disabled = false;
  const filtered = masterData.staffs.filter(s => s.department === deptVal);
  filtered.forEach(s => {
    emp.innerHTML += `<option value="${s.name}" data-id="${s.empId}">${s.name}</option>`;
  });
  emp.onchange = () => {
    selectedEmpId = emp.options[emp.selectedIndex].getAttribute("data-id");
  };
}

document.getElementById("images").addEventListener("change", function(){
  const preview = document.getElementById("preview");
  preview.innerHTML = "";
  [...this.files].forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.createElement("img");
      img.src = e.target.result;
      preview.appendChild(img);
    };
    reader.readAsDataURL(file);
  });
});

function generateImageId(){
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mi = String(now.getMinutes()).padStart(2,'0');
  const dd = String(now.getDate()).padStart(2,'0');
  const mm = String(now.getMonth() + 1).padStart(2,'0');
  const yy = String(now.getFullYear()).slice(-2);
  return (selectedEmpId || "Unknown") + dd + mm + yy; 
}

async function compressImage(file){
  return new Promise(resolve => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = e => { img.src = e.target.result; };
    img.onload = () => {
      const canvas = document.createElement("canvas");
      let width = img.width; let height = img.height;
      if(width > 1200){ height *= 1200 / width; width = 1200; }
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, width, height);
      resolve(canvas.toDataURL("image/jpeg", 0.7).split(',')[1]);
    };
    reader.readAsDataURL(file);
  });
}

document.getElementById("submitBtn").addEventListener("click", submitForm);

async function submitForm(){
  const dept = document.getElementById("department").value;
  const empName = document.getElementById("employee").value;
  const loc = document.getElementById("locationText").value;
  const rt = document.getElementById("riskType").value;
  const rl = document.getElementById("riskLevel").value;
  const imgFiles = document.getElementById("images").files;

  if(!dept || !empName || !loc || !rt || !rl || imgFiles.length === 0){
    alert("กรุณากรอกข้อมูลและแนบรูปภาพให้ครบถ้วน"); return;
  }

  const status = document.getElementById("status");
  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  status.innerHTML = "⌛ กำลังบันทึกข้อมูล...";

  try {
    const imageId = generateImageId();
    
    // 1. บันทึกข้อมูล Text
    const saveResponse = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "saveForm",
        reporter: empName,
        department: dept,
        location: loc,
        riskType: rt,
        riskLevel: rl,
        note: document.getElementById("note").value,
        totalImages: imgFiles.length,
        imageId: imageId
      })
    });
    
    const saveResult = await saveResponse.json();
    if(!saveResult.success) throw new Error("บันทึกข้อมูลไม่สำเร็จ");

    // 2. อัปโหลดรูปภาพทีละใบ
    for(let i=0; i < imgFiles.length; i++){
      status.innerHTML = `📸 กำลังอัปโหลดรูปที่ ${i+1}/${imgFiles.length}...`;
      const base64 = await compressImage(imgFiles[i]);
      const uploadResponse = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "uploadImage",
          base64: base64,
          rowNumber: saveResult.rowNumber,
          imageId: imageId + "_" + (i+1)
        })
      });
      const uploadResult = await uploadResponse.json();
      if(!uploadResult.success) throw new Error("อัปโหลดรูปที่ " + (i+1) + " ไม่สำเร็จ");
    }

    alert("✅ บันทึกข้อมูลและรูปภาพสำเร็จเรียบร้อย");
    resetForm();

  } catch(err){
    console.error(err);
    alert("❌ เกิดข้อผิดพลาด: " + err.message);
    status.innerHTML = "❌ บันทึกไม่สำเร็จ";
  } finally {
    btn.disabled = false;
  }
}

function resetForm(){
  document.getElementById("locationText").value = "";
  document.getElementById("note").value = "";
  document.getElementById("images").value = "";
  document.getElementById("preview").innerHTML = "";
  document.getElementById("status").innerHTML = "";
  document.getElementById("department").selectedIndex = 0;
  document.getElementById("employee").innerHTML = '<option value="">เลือกพนักงาน</option>';
  document.getElementById("employee").disabled = true;
  document.getElementById("riskType").selectedIndex = 0;
  document.getElementById("riskLevel").selectedIndex = 0;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

loadMasterData();
</script>
</body>
</html>
