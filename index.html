<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>รายงานจุดเสี่ยง โรงงานอาหารสัตว์ศรีราชา</title>

<style>

*{
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{

  margin:0;
  min-height:100vh;

  background:
    linear-gradient(
      135deg,
      #0f766e,
      #062b2b,
      #000000
    );

  display:flex;
  justify-content:center;
  align-items:center;

  padding:20px;

  color:white;
}

.container{

  width:100%;
  max-width:720px;

  background:rgba(255,255,255,0.08);

  backdrop-filter:blur(10px);

  border-radius:24px;

  padding:30px;

  box-shadow:
    0 0 30px rgba(0,0,0,0.5);
}

h1{

  text-align:center;

  margin-bottom:30px;

  color:#8fffe0;

  font-size:2rem;
}

.form-group{

  margin-bottom:20px;
}

label{

  display:block;

  margin-bottom:8px;

  font-size:1.1rem;

  font-weight:bold;
}

input,
select,
textarea{

  width:100%;

  padding:16px;

  border:none;

  border-radius:14px;

  font-size:1rem;

  background:white;

  color:black;
}

textarea{

  min-height:120px;

  resize:vertical;
}

input[type=file]{

  background:rgba(255,255,255,0.1);

  color:white;
}

button{

  width:100%;

  padding:18px;

  border:none;

  border-radius:14px;

  font-size:1.2rem;

  font-weight:bold;

  cursor:pointer;

  background:
    linear-gradient(
      90deg,
      #00c9a7,
      #00e5ff
    );

  color:white;

  transition:0.3s;
}

button:hover{

  transform:scale(1.02);
}

#status{

  margin-top:20px;

  text-align:center;

  color:#8fffe0;

  font-size:1rem;
}

.preview{

  margin-top:10px;

  display:flex;

  flex-wrap:wrap;

  gap:10px;
}

.preview img{

  width:100px;

  height:100px;

  object-fit:cover;

  border-radius:12px;
}

@media(max-width:600px){

  h1{
    font-size:1.5rem;
  }

  input,
  select,
  textarea{

    font-size:1rem;
  }
}

</style>

</head>

<body>

<div class="container">

<h1>
รายงานจุดเสี่ยง โรงงานอาหารสัตว์ศรีราชา
</h1>

<div class="form-group">

<label>หน่วยงาน</label>

<select id="department" required>
<option value="">กำลังโหลด...</option>
</select>

</div>

<div class="form-group">

<label>ชื่อพนักงาน</label>

<select id="employee" required>
<option value="">เลือกพนักงาน</option>
</select>

</div>

<div class="form-group">

<label>จุดพบความเสี่ยง</label>

<textarea
  id="location"
  placeholder="แจ้งสถานที่หรือจุดเสี่ยง"
></textarea>

</div>

<div class="form-group">

<label>ประเภทความเสี่ยง</label>

<select id="riskType"></select>

</div>

<div class="form-group">

<label>ระดับความเสี่ยง</label>

<select id="riskLevel"></select>

</div>

<div class="form-group">

<label>แนบรูปภาพ</label>

<input
  type="file"
  id="images"
  multiple
  accept="image/*"
/>

<div class="preview" id="preview"></div>

</div>

<div class="form-group">

<label>หมายเหตุ</label>

<textarea id="note"></textarea>

</div>

<button onclick="submitForm()">
บันทึกข้อมูล
</button>

<div id="status"></div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbyylZ0FfpPWqZj-Rl-dLDlWF3NonI9qz8-b1col2ShyMfsAcgXtEHDP218ixxDCRnlw/exec";

let masterData = {};

let selectedEmpId = "";

/**
 * =========================
 * โหลดข้อมูล
 * =========================
 */
async function loadMasterData(){

  try {

    const response =
      await fetch(
        API_URL + "?action=master"
      );

    const data = await response.json();

    if(!data.success){

      alert(data.message);
      return;
    }

    masterData = data;

    loadDepartments();
    loadRiskTypes();
    loadRiskLevels();

  } catch(err){

    console.error(err);

    alert("โหลดข้อมูลไม่สำเร็จ");
  }
}

/**
 * =========================
 * หน่วยงาน
 * =========================
 */
function loadDepartments(){

  const dept =
    document.getElementById("department");

  dept.innerHTML =
    '<option value="">เลือกหน่วยงาน</option>';

  masterData.departments.forEach(d=>{

    dept.innerHTML +=
      `<option value="${d}">${d}</option>`;

  });

  dept.addEventListener(
    "change",
    loadEmployees
  );
}

/**
 * =========================
 * พนักงาน
 * =========================
 */
function loadEmployees(){

  const dept =
    document.getElementById("department").value;

  const emp =
    document.getElementById("employee");

  emp.innerHTML =
    '<option value="">เลือกพนักงาน</option>';

  const filtered =
    masterData.staffs.filter(
      s => s.department === dept
    );

  filtered.forEach(s=>{

    emp.innerHTML += `
      <option
        value="${s.name}"
        data-id="${s.empId}"
      >
        ${s.name}
      </option>
    `;
  });

  emp.addEventListener("change",()=>{

    const selected =
      emp.options[emp.selectedIndex];

    selectedEmpId =
      selected.getAttribute("data-id");

  });
}

/**
 * =========================
 * ประเภทความเสี่ยง
 * =========================
 */
function loadRiskTypes(){

  const risk =
    document.getElementById("riskType");

  risk.innerHTML =
    '<option value="">เลือกประเภท</option>';

  masterData.riskTypes.forEach(r=>{

    risk.innerHTML +=
      `<option value="${r}">${r}</option>`;
  });
}

/**
 * =========================
 * ระดับความเสี่ยง
 * =========================
 */
function loadRiskLevels(){

  const risk =
    document.getElementById("riskLevel");

  risk.innerHTML =
    '<option value="">เลือกระดับ</option>';

  masterData.riskLevels.forEach(r=>{

    risk.innerHTML +=
      `<option value="${r}">${r}</option>`;
  });
}

/**
 * =========================
 * Preview รูป
 * =========================
 */
document
.getElementById("images")
.addEventListener("change",function(){

  const preview =
    document.getElementById("preview");

  preview.innerHTML = "";

  [...this.files].forEach(file=>{

    const reader = new FileReader();

    reader.onload = e=>{

      const img =
        document.createElement("img");

      img.src = e.target.result;

      preview.appendChild(img);
    };

    reader.readAsDataURL(file);
  });
});

/**
 * =========================
 * Generate Image ID
 * =========================
 */
function generateImageId(){

  const now = new Date();

  const dd =
    String(now.getDate()).padStart(2,'0');

  const mm =
    String(now.getMonth()+1).padStart(2,'0');

  const yy =
    String(now.getFullYear()).slice(-2);

  return selectedEmpId + dd + mm + yy;
}

/**
 * =========================
 * Compress Image
 * =========================
 */
async function compressImage(file){

  return new Promise(resolve=>{

    const img = new Image();

    const reader = new FileReader();

    reader.onload = e=>{

      img.src = e.target.result;
    };

    img.onload = ()=>{

      const canvas =
        document.createElement("canvas");

      let width = img.width;
      let height = img.height;

      const maxWidth = 1600;

      if(width > maxWidth){

        height *= maxWidth / width;

        width = maxWidth;
      }

      canvas.width = width;
      canvas.height = height;

      const ctx =
        canvas.getContext("2d");

      ctx.drawImage(
        img,
        0,
        0,
        width,
        height
      );

      canvas.toBlob(blob=>{

        resolve(blob);

      },'image/jpeg',0.8);
    };

    reader.readAsDataURL(file);
  });
}

/**
 * =========================
 * Blob to Base64
 * =========================
 */
function blobToBase64(blob){

  return new Promise(resolve=>{

    const reader = new FileReader();

    reader.onloadend = ()=>{

      resolve(
        reader.result.split(',')[1]
      );
    };

    reader.readAsDataURL(blob);
  });
}

/**
 * =========================
 * Submit Form
 * =========================
 */
async function submitForm(){

  const status =
    document.getElementById("status");

  const reporter =
    document.getElementById("employee").value;

  const department =
    document.getElementById("department").value;

  const location =
    document.getElementById("location").value;

  const riskType =
    document.getElementById("riskType").value;

  const riskLevel =
    document.getElementById("riskLevel").value;

  const note =
    document.getElementById("note").value;

  const images =
    document.getElementById("images").files;

  if(!department){

    alert("กรุณาเลือกหน่วยงาน");
    return;
  }

  if(!reporter){

    alert("กรุณาเลือกพนักงาน");
    return;
  }

  if(!location){

    alert("กรุณากรอกจุดเสี่ยง");
    return;
  }

  if(!riskType){

    alert("กรุณาเลือกประเภท");
    return;
  }

  if(!riskLevel){

    alert("กรุณาเลือกระดับ");
    return;
  }

  if(images.length === 0){

    alert("กรุณาแนบรูป");
    return;
  }

  try {

    status.innerHTML =
      "กำลังบันทึกข้อมูล...";

    const imageId =
      generateImageId();

    /**
     * STEP 1
     * SAVE FORM
     */
    const saveResponse =
      await fetch(API_URL,{

        method:"POST",

        body:JSON.stringify({

          action:"saveForm",

          reporter,
          department,
          location,
          riskType,
          riskLevel,
          note,

          totalImages:
            images.length,

          imageId
        })
      });

    const saveResult =
      await saveResponse.json();

    if(!saveResult.success){

      alert("บันทึกข้อมูลไม่สำเร็จ");
      return;
    }

    const rowNumber =
      saveResult.rowNumber;

    /**
     * STEP 2
     * Upload Images
     */
    for(let i=0;i<images.length;i++){

      status.innerHTML =
        `กำลังอัปโหลดรูป ${i+1}/${images.length}`;

      const compressed =
        await compressImage(images[i]);

      const base64 =
        await blobToBase64(compressed);

      const uploadResponse =
        await fetch(API_URL,{

          method:"POST",

          body:JSON.stringify({

            action:"uploadImage",

            base64,

            fileName:
              images[i].name,

            mimeType:
              compressed.type,

            rowNumber
          })
        });

      const uploadResult =
        await uploadResponse.json();

      if(!uploadResult.success){

        console.error(uploadResult);

        alert(
          "Upload รูปไม่สำเร็จ"
        );

        return;
      }
    }

    status.innerHTML =
      "✅ บันทึกข้อมูลสำเร็จ";

    setTimeout(()=>{

      location.reload();

    },1500);

  } catch(err){

    console.error(err);

    alert("เกิดข้อผิดพลาด");
  }
}

/**
 * =========================
 * START
 * =========================
 */
loadMasterData();

</script>

</body>
</html>
