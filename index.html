<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>รายงานจุดเสี่ยง โรงงานอาหารสัตว์ศรีราชา</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body {
            margin: 0; min-height: 100vh;
            background: linear-gradient(135deg, #0f766e, #042424, #000000);
            display: flex; justify-content: center; align-items: center;
            padding: 20px; color: white;
        }
        .container {
            width: 100%; max-width: 720px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px); border-radius: 24px;
            padding: 30px; box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 { text-align: center; color: #8fffe0; margin-bottom: 30px; font-size: 1.8rem; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 1.1rem; font-weight: bold; color: #8fffe0; }
        input, select, textarea {
            width: 100%; padding: 16px; border: none; border-radius: 14px;
            font-size: 1.05rem; background: rgba(255, 255, 255, 0.95); color: #1a1a1a;
        }
        textarea { min-height: 100px; resize: vertical; }
        button {
            width: 100%; padding: 18px; border: none; border-radius: 14px;
            font-size: 1.2rem; font-weight: bold; cursor: pointer;
            background: linear-gradient(90deg, #00c9a7, #00e5ff); color: white;
            transition: 0.3s; box-shadow: 0 4px 15px rgba(0, 201, 167, 0.3);
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 201, 167, 0.5); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .preview { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .preview img { width: 90px; height: 90px; object-fit: cover; border-radius: 12px; border: 2px solid #00c9a7; }
        #status { margin-top: 20px; text-align: center; font-weight: bold; color: #8fffe0; min-height: 1.5em; }
    </style>
</head>
<body>

<div class="container">
    <h1>รายงานจุดเสี่ยง โรงงานอาหารสัตว์ศรีราชา</h1>

    <div class="form-group">
        <label>หน่วยงาน</label>
        <select id="department"><option value="">กำลังโหลด...</option></select>
    </div>

    <div class="form-group">
        <label>ชื่อพนักงาน</label>
        <select id="employee" disabled><option value="">เลือกพนักงาน</option></select>
    </div>

    <div class="form-group">
        <label>จุดพบความเสี่ยง</label>
        <textarea id="locationText" placeholder="แจ้งสถานที่หรือจุดเสี่ยง"></textarea>
    </div>

    <div class="form-group">
        <label>ประเภทความเสี่ยง</label>
        <select id="riskType"></select>
    </div>

    <div class="form-group">
        <label>ระดับความเสี่ยง</label>
        <select id="riskLevel"></select>
    </div>

    <div class="form-group">
        <label>แนบรูปภาพ</label>
        <input type="file" id="images" multiple accept="image/*" />
        <div class="preview" id="preview"></div>
    </div>

    <div class="form-group">
        <label>หมายเหตุ</label>
        <textarea id="note"></textarea>
    </div>

    <button id="submitBtn">บันทึกข้อมูล</button>
    <div id="status"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxtKoq8MED6gYB9bZ2ZjAkxT42Vrrop3OBeM9dzajP4QDMT6fisH7PxH-om5DOQKvnL/exec";
let masterData = {};
let selectedEmpId = "";

// โหลดข้อมูล Master
async function loadMasterData() {
    try {
        const response = await fetch(API_URL + "?action=master");
        const data = await response.json();
        if (data.success) {
            masterData = data;
            setupDropdowns();
        }
    } catch (e) { console.error("Load failed", e); }
}

function setupDropdowns() {
    const dept = document.getElementById("department");
    dept.innerHTML = '<option value="">เลือกหน่วยงาน</option>';
    masterData.departments.forEach(d => dept.innerHTML += `<option value="${d}">${d}</option>`);
    dept.onchange = loadEmployees;

    const rt = document.getElementById("riskType");
    rt.innerHTML = '<option value="">เลือกประเภท</option>';
    masterData.riskTypes.forEach(r => rt.innerHTML += `<option value="${r}">${r}</option>`);

    const rl = document.getElementById("riskLevel");
    rl.innerHTML = '<option value="">เลือกระดับ</option>';
    masterData.riskLevels.forEach(r => rl.innerHTML += `<option value="${r}">${r}</option>`);
}

function loadEmployees() {
    const deptVal = document.getElementById("department").value;
    const emp = document.getElementById("employee");
    emp.innerHTML = '<option value="">เลือกพนักงาน</option>';
    if (!deptVal) { emp.disabled = true; return; }
    emp.disabled = false;
    masterData.staffs.filter(s => s.department === deptVal).forEach(s => {
        emp.innerHTML += `<option value="${s.name}" data-id="${s.empId}">${s.name}</option>`;
    });
}

document.getElementById("images").onchange = function() {
    const preview = document.getElementById("preview");
    preview.innerHTML = "";
    [...this.files].forEach(file => {
        const reader = new FileReader();
        reader.onload = e => {
            const img = document.createElement("img");
            img.src = e.target.result;
            preview.appendChild(img);
        };
        reader.readAsDataURL(file);
    });
};

async function compressAndGetBase64(file) {
    return new Promise(resolve => {
        const img = new Image();
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = e => img.src = e.target.result;
        img.onload = () => {
            const canvas = document.createElement("canvas");
            let w = img.width, h = img.height;
            if (w > 1200) { h *= 1200 / w; w = 1200; }
            canvas.width = w; canvas.height = h;
            canvas.getContext("2d").drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL("image/jpeg", 0.7).split(',')[1]);
        };
    });
}

document.getElementById("submitBtn").onclick = async function() {
    const btn = this;
    const status = document.getElementById("status");
    const empSelect = document.getElementById("employee");
    
    if (!empSelect.value || !document.getElementById("locationText").value || document.getElementById("images").files.length === 0) {
        alert("กรุณากรอกข้อมูลและแนบรูปภาพให้ครบถ้วน"); return;
    }

    btn.disabled = true;
    status.innerHTML = "⌛ กำลังบันทึกข้อมูลส่วนข้อความ...";

    try {
        const empId = empSelect.options[empSelect.selectedIndex].getAttribute("data-id");
        const now = new Date();
        const dateStr = String(now.getDate()).padStart(2,'0') + String(now.getMonth()+1).padStart(2,'0') + String(now.getFullYear()).slice(-2);
        const imageIdBase = empId + dateStr;

        // --- Step 1: บันทึกข้อมูลตัวอักษร ---
        const resText = await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({
                action: "saveForm",
                reporter: empSelect.value,
                department: document.getElementById("department").value,
                location: document.getElementById("locationText").value,
                riskType: document.getElementById("riskType").value,
                riskLevel: document.getElementById("riskLevel").value,
                note: document.getElementById("note").value,
                totalImages: document.getElementById("images").files.length,
                imageId: imageIdBase
            })
        });
        
        // อ่านค่าเป็น Text ก่อนเพื่อดักจับ Error ที่ไม่ได้มาเป็น JSON
        const rawText = await resText.text();
        let resultText;
        try { 
            resultText = JSON.parse(rawText); 
        } catch(e) { 
            throw new Error("เซิร์ฟเวอร์ไม่ได้ตอบเป็น JSON (Step 1):\n" + rawText); 
        }

        // ดักทั้งกรณี success เป็น false หรือ status เป็น error
        if (resultText.success === false || resultText.status === "error") {
            throw new Error("บันทึกข้อความไม่สำเร็จ:\n" + (resultText.error || resultText.message || rawText));
        }

        // เช็คว่าระบบหา ID แถวเจอหรือไม่ (เผื่อโค้ดเก่าคุณใช้ตัวแปรชื่อ row แทน rowNumber)
        const targetRow = resultText.rowNumber || resultText.row;
        if (!targetRow) {
            console.warn("แจ้งเตือน: ไม่พบตัวเลขแถว (rowNumber) ส่งกลับมาจาก Server", resultText);
        }

        // --- Step 2: ทยอยส่งรูปภาพ ---
        const files = document.getElementById("images").files;
        for (let i = 0; i < files.length; i++) {
            status.innerHTML = `📸 กำลังอัปโหลดรูปที่ ${i+1}/${files.length}...`;
            const base64 = await compressAndGetBase64(files[i]);
            
            const resImg = await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({
                    action: "uploadImage",
                    base64: base64,
                    rowNumber: targetRow,  // จุดที่มักจะมีปัญหาถ้าค่านี้ว่าง
                    imageId: imageIdBase + "_" + (i+1)
                })
            });
            
            const rawImg = await resImg.text();
            let resultImg;
            try { 
                resultImg = JSON.parse(rawImg); 
            } catch(e) { 
                throw new Error("เซิร์ฟเวอร์ไม่ได้ตอบเป็น JSON (รูปที่ " + (i+1) + "):\n" + rawImg); 
            }

            if (resultImg.success === false || resultImg.status === "error") {
                throw new Error(`รูปที่ ${i+1} บันทึกไม่สมบูรณ์:\n` + (resultImg.error || resultImg.message || rawImg));
            }
        }

        // สำเร็จ 100%
        status.innerHTML = "✅ บันทึกข้อมูลและรูปภาพสำเร็จเรียบร้อย";
        alert("✅ บันทึกข้อมูลสำเร็จ");
        resetForm();

    } catch (err) {
        console.error("ระบบตรวจพบปัญหา:", err);
        alert("❌ เกิดข้อผิดพลาดฝั่งเซิร์ฟเวอร์:\n" + err.message);
        status.innerHTML = "❌ บันทึกไม่สำเร็จ (ดูรายละเอียดในหน้าต่างแจ้งเตือน)";
    } finally {
        btn.disabled = false;
    }
};

function resetForm() {
    document.getElementById("locationText").value = "";
    document.getElementById("note").value = "";
    document.getElementById("images").value = "";
    document.getElementById("preview").innerHTML = "";
    document.getElementById("status").innerHTML = "";
    document.getElementById("department").selectedIndex = 0;
    document.getElementById("employee").innerHTML = '<option value="">เลือกพนักงาน</option>';
    document.getElementById("employee").disabled = true;
    document.getElementById("riskType").selectedIndex = 0;
    document.getElementById("riskLevel").selectedIndex = 0;
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

loadMasterData();
</script>
</body>
</html>
