<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>แจ้งจุดเสี่ยง | Risk Report</title>
  <style>
    /* ... (ใส่ CSS ที่คุณเคยมีตรงนี้) ... */
    body { background: #0d0f14; color: #e8eaf0; font-family: sans-serif; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; }
    input, select, textarea { width: 100%; padding: 10px; margin: 5px 0 15px; }
    .submit-btn { width: 100%; padding: 15px; background: #ff5c3a; color: white; border: none; cursor: pointer; }
  </style>
</head>
<body>

<div class="container">
  <h1>แจ้งจุดเสี่ยง</h1>
  <form id="riskForm">
    <label>ชื่อผู้แจ้ง</label>
    <input type="text" id="reporter-name" required placeholder="ระบุชื่อ">
    
    <label>หน่วยงาน</label>
    <select id="dept">
      <option value="ฝ่ายผลิต">ฝ่ายผลิต</option>
      <option value="ฝ่ายวิศวกรรม">ฝ่ายวิศวกรรม</option>
    </select>

    <label>พื้นที่</label>
    <select id="area">
      <option value="โรงงาน A">โรงงาน A</option>
    </select>

    <input type="hidden" id="riskType" value="ทั่วไป">
    <input type="hidden" id="severity" value="ปานกลาง">
    
    <label>เครื่องจักร</label>
    <input type="text" id="machine">

    <label>รายละเอียด</label>
    <textarea id="note"></textarea>

    <button type="submit" class="submit-btn" id="submitBtn">
      <span id="spinner" style="display:none;">⏳ กำลังส่ง...</span>
      <span id="submitIcon">📤 ส่งรายงาน</span>
    </button>
  </form>
</div>

<script>
  // ตัวแปรสำหรับเก็บไฟล์ภาพ (จำลองไว้เพื่อให้ script ทำงานได้)
  let imageFiles = []; 
  
  // URL เว็บแอปที่คุณได้มา
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby9h2LyffpY0-nAayXumrS2Fbf6eV7qSriLtpXXwqErXFtmI12eI0kfmqmADAcEELdr/exec';

  document.getElementById('riskForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const btn = document.getElementById('submitBtn');
    const spinner = document.getElementById('spinner');
    const icon = document.getElementById('submitIcon');
    
    btn.disabled = true;
    spinner.style.display = 'inline';
    icon.style.display = 'none';

    const payload = {
      timestamp: new Date().toLocaleString('th-TH'),
      reporter: document.getElementById('reporter-name').value.trim(),
      dept: document.getElementById('dept').value,
      area: document.getElementById('area').value,
      machine: document.getElementById('machine').value.trim(),
      riskType: document.getElementById('riskType').value,
      severity: document.getElementById('severity').value,
      note: document.getElementById('note').value.trim(),
      imageCount: imageFiles.length,
    };

    try {
      const formData = new FormData();
      formData.append('data', JSON.stringify(payload));
      
      // ส่งรูปภาพ
      imageFiles.forEach((f, i) => {
        formData.append('image_' + i, f.blob, `img_${i}.jpg`);
      });

      await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: formData
      });

      alert('ส่งข้อมูลสำเร็จ!');
      location.reload();

    } catch (err) {
      alert('เกิดข้อผิดพลาด: ' + err.message);
      btn.disabled = false;
      spinner.style.display = 'none';
      icon.style.display = 'inline';
    }
  });

  // ฟังก์ชัน validate จำลอง
  function validate() { return true; }
</script>

</body>
</html>
