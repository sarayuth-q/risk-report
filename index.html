<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Risk Reporting - CPF Sriracha</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ============ LIQUID GLASS & THEME COLORS ============ */
        :root {
            --bg-deep: #10333e;       /* Deep Teal จากภาพตัวอย่าง */
            --gold-main: #dfbb76;     /* สีทองพรีเมียม */
            --gold-light: #f2dbab;
            --emerald-modern: #2dd4bf; /* สีเขียวทันสมัยที่คุณเลือก */
            --text-main: #ffffff;
            --text-muted: #a3c1cc;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-highlight: rgba(255, 255, 255, 0.25);
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 10px;
        }

        * { box-sizing: border-box; font-family: 'Noto Sans Thai', sans-serif; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(223, 187, 118, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(45, 212, 191, 0.05) 0%, transparent 40%);
            background-attachment: fixed;
            color: var(--text-main);
            display: flex; justify-content: center; align-items: flex-start;
            padding: 20px 15px; min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* ============ GLASS CONTAINER ============ */
        .container {
            width: 100%; max-width: 860px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(160%);
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            border: 1px solid var(--glass-border);
            border-top: 1px solid var(--glass-highlight);
            border-left: 1px solid var(--glass-highlight);
            border-radius: var(--radius-lg);
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            position: relative;
        }

        h1, h2, h3, h4 { color: var(--gold-light); font-weight: 600; }
        
        .view { display: none; opacity: 0; transition: all 0.4s ease; }
        .view.active { display: block; opacity: 1; animation: floatUp 0.4s ease forwards; }
        @keyframes floatUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* ============ HOME PAGE ============ */
        .home-header { display: flex; flex-direction: column; align-items: center; padding-bottom: 25px; text-align: center; }
        .helmet-wrap { width: 100px; height: 100px; margin-bottom: 15px; }
        .home-title h1 { 
            font-size: 1.8rem; margin-bottom: 5px;
            background: linear-gradient(135deg, #fff, var(--gold-main));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .home-title p { font-size: 1rem; color: var(--text-muted); }
        .home-btns { display: flex; flex-direction: column; gap: 15px; max-width: 400px; margin: 30px auto 0; }

        /* ============ FORMS & INPUTS ============ */
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.95rem; font-weight: 500; color: var(--gold-light); }
        input, select, textarea {
            width: 100%; padding: 14px 16px;
            background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255,255,255,0.1);
            border-radius: var(--radius-sm); color: var(--text-main); font-size: 1rem; outline: none;
        }
        textarea { resize: vertical; min-height: 90px; }

        /* ============ BUTTONS ============ */
        button {
            width: 100%; padding: 15px; border: none; border-radius: var(--radius-md);
            font-size: 1.05rem; font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .btn-primary { 
            background: linear-gradient(135deg, var(--gold-light), var(--gold-main)); color: #10333e;
            box-shadow: 0 4px 15px rgba(223, 187, 118, 0.2);
        }
        .btn-secondary { background: rgba(255, 255, 255, 0.08); border: 1px solid var(--glass-border); color: #fff; }
        .btn-danger { background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5; }

        /* ============ DASHBOARD & KPI ============ */
        .kpi-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .kpi-card { background: rgba(0, 0, 0, 0.2); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid var(--glass-border); }
        .kpi-value { font-size: 1.8rem; font-weight: 700; color: var(--gold-main); }
        .kpi-title { font-size: 0.8rem; color: var(--text-muted); }

        .charts-wrapper { display: grid; grid-template-columns: 1.8fr 1fr; gap: 15px; margin-bottom: 25px; }
        .chart-container { background: rgba(0,0,0,0.15); border: 1px solid var(--glass-border); border-radius: 15px; padding: 15px; }

        /* ============ TABLE FIX (พอดีหน้าจอ & แบ่งคอลัมน์เป๊ะ) ============ */
        .table-responsive {
            width: 100%; overflow: hidden; border-radius: var(--radius-md);
            border: 1px solid var(--glass-border); background: rgba(0, 0, 0, 0.15);
        }
        table {
            width: 100%; table-layout: fixed; border-collapse: collapse;
        }
        th, td { 
            padding: 14px 10px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); 
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        th { color: var(--gold-main); font-size: 0.85rem; font-weight: 600; background: rgba(255,255,255,0.05); }
        
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; display: inline-block; }
        .status-pass { background: rgba(45, 212, 191, 0.2); color: var(--emerald-modern); border: 1px solid rgba(45, 212, 191, 0.3); }
        .status-fail { background: rgba(245, 158, 11, 0.2); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.3); }

        /* ============ OVERLAYS ============ */
        #loadingOverlay, #successPopup {
            display: none; position: fixed; inset: 0; z-index: 9999;
            background: rgba(16, 51, 62, 0.85); backdrop-filter: blur(15px);
            justify-content: center; align-items: center; flex-direction: column;
        }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--gold-main); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ============ MOBILE RESPONSIVE ============ */
        @media (max-width: 600px) {
            .container { padding: 25px 20px; }
            .kpi-cards { grid-template-columns: 1fr 1fr; }
            .kpi-cards .kpi-card:last-child { grid-column: span 2; }
            .charts-wrapper { grid-template-columns: 1fr; }
            .home-title h1 { font-size: 1.4rem; }
            td { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner"></div>
    <p id="loadingMsg" style="color: var(--gold-light);">กำลังประมวลผล...</p>
</div>

<div id="successPopup">
    <div style="background: rgba(255,255,255,0.1); padding: 40px; border-radius: 24px; text-align: center; border: 1px solid var(--glass-highlight); max-width: 350px;">
        <div style="font-size: 4rem; margin-bottom: 15px;">✅</div>
        <h3 style="margin-bottom: 10px;">บันทึกสำเร็จ</h3>
        <p style="margin-bottom: 25px; color: var(--text-muted);">ข้อมูลถูกส่งเข้าระบบเรียบร้อยแล้ว</p>
        <button class="btn-primary" onclick="closeSuccessPopup()">ตกลง</button>
    </div>
</div>

<div class="container">

    <div id="viewHome" class="view active">
        <div class="home-header">
            <div class="helmet-wrap">
                <svg viewBox="0 0 110 110">
                    <path d="M55 15 C30 15, 12 34, 12 56 L12 66 L98 66 L98 56 C98 34, 80 15, 55 15 Z" fill="#dfbb76" />
                    <text x="55" y="52" font-family="Arial" font-size="20" font-weight="900" fill="#10333e" text-anchor="middle">CPF</text>
                    <rect x="5" y="62" width="100" height="8" rx="4" fill="#8c6a2e" />
                </svg>
            </div>
            <div class="home-title">
                <h1>ระบบแจ้งจุดเสี่ยง</h1>
                <p>โรงงานอาหารสัตว์ศรีราชา</p>
            </div>
        </div>
        <div class="home-btns">
            <button class="btn-primary" onclick="switchView('viewForm')">🚧 ส่งรายงานจุดเสี่ยง</button>
            <button class="btn-secondary" onclick="switchView('viewLogin')">📊 ดูรายงานสรุป</button>
        </div>
    </div>

    <div id="viewForm" class="view">
        <h2 style="margin-bottom: 20px;">ส่งรายงานจุดเสี่ยง</h2>
        <div class="form-group"><label>หน่วยงาน</label><select id="department"><option value="">กำลังโหลด...</option></select></div>
        <div class="form-group"><label>ชื่อพนักงาน</label><select id="employee" disabled><option value="">เลือกพนักงาน</option></select></div>
        <div class="form-group"><label>สถานที่พบความเสี่ยง</label><textarea id="locationText" placeholder="ระบุรายละเอียดสถานที่..."></textarea></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <div class="form-group"><label>ประเภทความเสี่ยง</label><select id="riskType"></select></div>
            <div class="form-group"><label>ระดับความเสี่ยง</label><select id="riskLevel"></select></div>
        </div>
        <div class="form-group"><label>แนบรูปภาพ</label><input type="file" id="images" multiple accept="image/*" /><div class="preview" id="preview"></div></div>
        <div class="form-group"><label>หมายเหตุ</label><textarea id="note"></textarea></div>
        <button id="submitBtn" class="btn-primary" style="margin-top: 10px;">💾 บันทึกข้อมูล</button>
        <button class="btn-secondary" onclick="switchView('viewHome')">ย้อนกลับ</button>
    </div>

    <div id="viewLogin" class="view">
        <h2 style="margin-bottom: 20px;">เข้าสู่ระบบ Dashboard</h2>
        <div class="form-group"><label>ชื่อผู้ใช้งาน</label><input type="text" id="loginUser"></div>
        <div class="form-group"><label>รหัสผ่าน</label><input type="password" id="loginPass"></div>
        <button id="btnLogin" class="btn-primary">เข้าสู่ระบบ</button>
        <button class="btn-secondary" onclick="switchView('viewHome')">ย้อนกลับ</button>
        <div id="loginStatus"></div>
    </div>

    <div id="viewDashboard" class="view">
        <h2 style="margin-bottom: 20px; color: var(--gold-main);">รายงานภาพรวม</h2>
        
        <div class="kpi-cards">
            <div class="kpi-card"><div class="kpi-title">แจ้งแล้ว (เรื่อง)</div><div class="kpi-value" id="kpiActual">0</div></div>
            <div class="kpi-card"><div class="kpi-title">เป้าโรงงาน</div><div class="kpi-value" id="kpiTarget">0</div></div>
            <div class="kpi-card"><div class="kpi-title">ผ่านเป้า (คน)</div><div class="kpi-value" id="kpiPass">0</div></div>
        </div>

        <div class="charts-wrapper">
            <div class="chart-container"><canvas id="deptChart"></canvas></div>
            <div class="chart-container" style="height: 250px; display: flex; flex-direction: column; align-items: center;">
                <label style="font-size: 0.8rem; margin-bottom: 10px; color: var(--text-muted);">ระดับความเสี่ยง</label>
                <div style="flex:1; width:100%;"><canvas id="riskDonutChart"></canvas></div>
            </div>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th style="width: 45%;">พนักงาน</th>
                        <th style="width: 20%; text-align: center;">ส่ง/เป้า</th>
                        <th style="width: 20%; text-align: center;">สถานะ</th>
                        <th style="width: 15%; text-align: center;">ข้อมูล</th>
                    </tr>
                </thead>
                <tbody id="dashTableBody"></tbody>
            </table>
        </div>
        <button class="btn-danger" onclick="switchView('viewHome')" style="margin-top: 30px;">ออกจากระบบ</button>
    </div>

</div>

<script>
Chart.register(ChartDataLabels);

const API_URL = "https://script.google.com/macros/s/AKfycbyUQr0FXIPkshbY3ir6r7Gab3erAJ0DThGJkGLFYjJ_JViSHR1E7DIt2r_tRF-vy66B/exec";

let masterData = {}; let dashboardData = []; let dashboardTargets = {};
let barChartInstance = null; let donutChartInstance = null;

// ============ UI FUNCTIONS ============
function showLoading(msg) { document.getElementById('loadingOverlay').style.display = 'flex'; document.getElementById('loadingMsg').innerText = msg || 'กำลังโหลด...'; }
function hideLoading() { document.getElementById('loadingOverlay').style.display = 'none'; }
function showSuccess() { document.getElementById('successPopup').style.display = 'flex'; }
function closeSuccessPopup() { document.getElementById('successPopup').style.display = 'none'; switchView('viewHome'); }

function switchView(viewId) {
    document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
    document.getElementById(viewId).classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

window.onload = async () => {
    try { const res = await fetch(API_URL + "?action=master"); const data = await res.json(); if (data.success) { masterData = data; setupDropdowns(); } } catch(e) {}
};

function setupDropdowns() {
    const dept = document.getElementById("department");
    masterData.departments.forEach(d => dept.innerHTML += `<option value="${d}">${d}</option>`);
    dept.onchange = () => {
        const emp = document.getElementById("employee"); emp.innerHTML = '<option value="">เลือกพนักงาน</option>';
        if (!dept.value) { emp.disabled = true; return; }
        emp.disabled = false;
        masterData.staffs.filter(s => s.department === dept.value).forEach(s => emp.innerHTML += `<option value="${s.name}" data-id="${s.empId}">${s.name}</option>`);
    };
    masterData.riskTypes.forEach(r => document.getElementById("riskType").innerHTML += `<option value="${r}">${r}</option>`);
    masterData.riskLevels.forEach(r => document.getElementById("riskLevel").innerHTML += `<option value="${r}">${r}</option>`);
}

// ============ DASHBOARD RENDER (จุดแก้ไขสีโดนัท) ============
function renderDashboard() {
    // ... (ส่วน Filter ข้อมูลจะทำงานที่นี่ตามระบบของคุณ) ...
    // สมมติ filtered คือข้อมูลที่ผ่านการกรองแล้ว
    
    // กราฟโดนัท
    let riskLabels = ["ต่ำ", "กลาง", "สูง"]; // ตัวอย่าง Label
    let riskData = [10, 5, 2]; // ตัวอย่าง Data
    
    // แก้ไขสีตรงนี้: ต่ำใช้ #2dd4bf
    let riskColors = riskLabels.map(l => l.includes('สูง') ? '#ef4444' : l.includes('กลาง') ? '#f59e0b' : '#2dd4bf');

    if(donutChartInstance) donutChartInstance.destroy();
    donutChartInstance = new Chart(document.getElementById('riskDonutChart'), {
        type: 'doughnut',
        data: { labels: riskLabels, datasets: [{ data: riskData, backgroundColor: riskColors, borderWidth: 0 }] },
        options: {
            responsive: true, maintainAspectRatio: false, cutout: '70%',
            plugins: {
                legend: { position: 'bottom', labels: { color: '#a3c1cc', font: {size: 10}, usePointStyle: true } },
                datalabels: { color: '#fff', font: { weight: 'bold', size: 12 } }
            }
        }
    });
    
    // (ฟังก์ชันการดึงข้อมูลจริงและการแสดงผลในตารางให้ใช้ logic เดิมจาก Code ล่าสุดที่คุณมี)
}

// *** หมายเหตุ: อย่าลืมเชื่อมฟังก์ชัน Login และ Load Dashboard เข้ากับ API_URL ของคุณ ***
</script>
</body>
</html>
