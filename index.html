<!DOCTYPE html>
<html lang="th">
<head>
    </head>
<body>
    <script>
    // ---- ส่วนการตั้งค่าและฟังก์ชันอื่นๆ (Datetime, Risk buttons, Image handling) คงเดิมไว้ทั้งหมด ----

    // [จุดที่ต้องระวัง] ตรวจสอบว่าได้ใส่ URL ของ Web App ที่ถูกต้องแล้ว
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzK-p8dUecL5ChyOFCBVS3uoh9x3zv56JCNh4R53yd9VTYsJ1Sf1WxB8jk7c8iwkuot/exec';

    // ---- ปรับปรุงส่วน Submit ใหม่ ----
    document.getElementById('riskForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      // 1. ตรวจสอบความถูกต้องของข้อมูล
      if (!validate()) { 
        showToast('กรุณากรอกข้อมูลที่จำเป็นให้ครบ'); 
        return; 
      }

      const btn = document.getElementById('submitBtn');
      const spinner = document.getElementById('spinner');
      const icon = document.getElementById('submitIcon');
      
      // แสดงสถานะกำลังโหลด
      btn.disabled = true;
      spinner.style.display = 'block';
      icon.style.display = 'none';

      // 2. เตรียมข้อมูล (Payload)
      const payload = {
        timestamp: new Date().toLocaleString('th-TH'),
        reporter: document.getElementById('reporter-name').value.trim(),
        dept: document.getElementById('dept').value,
        area: document.getElementById('area').value,
        machine: document.getElementById('machine').value.trim(),
        riskType: document.getElementById('riskType').value,
        severity: document.getElementById('severity').value,
        note: document.getElementById('note').value.trim(),
        imageCount: imageFiles.length,
      };

      try {
        if (APPS_SCRIPT_URL !== '') {
          const formData = new FormData();
          
          // ส่งข้อมูล Text ในรูปแบบ JSON string
          formData.append('data', JSON.stringify(payload));
          
          // ส่งไฟล์รูปภาพ (ถ้ามี)
          imageFiles.forEach((f, i) => {
            formData.append('image_' + i, f.blob, `img_${i}_${Date.now()}.jpg`);
          });

          // 3. ส่งข้อมูลไปยัง Google Apps Script (ถอด mode: 'no-cors' ออก)
          const response = await fetch(APPS_SCRIPT_URL, {
            method: 'POST',
            body: formData
          });

          // แม้จะเป็น Google Script บางครั้ง Response อาจถูกบล็อก แต่ถ้าข้อมูลเข้า Sheets คือใช้ได้ครับ
        } else {
          // Demo mode
          await new Promise(r => setTimeout(r, 1500));
        }

        // 4. แสดงผลสำเร็จ
        const ref = 'RSK-' + Date.now().toString(36).toUpperCase().slice(-8);
        document.getElementById('refCode').textContent = ref;
        document.getElementById('successOverlay').classList.add('show');

      } catch (err) {
        console.error('Submission Error:', err);
        showToast('เกิดข้อผิดพลาด: ' + err.message);
        
        // คืนค่าปุ่มหากเกิดข้อผิดพลาด
        btn.disabled = false;
        spinner.style.display = 'none';
        icon.style.display = '';
      }
    });

    // ---- ฟังก์ชัน resetForm() คงเดิม ----
    </script>
</body>
</html>
