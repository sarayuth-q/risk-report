<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ระบบรายงานและสรุปจุดเสี่ยง โรงงานอาหารสัตว์ศรีราชา</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body {
            margin: 0; min-height: 100vh;
            background: linear-gradient(135deg, #0f766e, #042424, #000000);
            display: flex; justify-content: center; align-items: center;
            padding: 20px; color: white;
        }
        .container {
            width: 100%; max-width: 720px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px); border-radius: 24px;
            padding: 30px; box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 { text-align: center; color: #8fffe0; margin-bottom: 25px; font-size: 1.8rem; }
        h2 { color: #00c9a7; text-align: center; margin-bottom: 20px; }
        
        .view { display: none; animation: fadeIn 0.3s; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Form Styles */
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 1.1rem; font-weight: bold; color: #8fffe0; }
        input, select, textarea {
            width: 100%; padding: 14px; border: none; border-radius: 12px;
            font-size: 1.05rem; background: rgba(255, 255, 255, 0.95); color: #1a1a1a;
        }
        textarea { min-height: 100px; resize: vertical; }
        
        /* Buttons */
        button {
            width: 100%; padding: 16px; border: none; border-radius: 14px;
            font-size: 1.2rem; font-weight: bold; cursor: pointer; color: white;
            transition: 0.3s; margin-bottom: 15px;
        }
        .btn-primary { background: linear-gradient(90deg, #00c9a7, #00e5ff); box-shadow: 0 4px 15px rgba(0, 201, 167, 0.3); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 201, 167, 0.5); }
        .btn-secondary { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.3); }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.2); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }

        /* Dashboard Styles */
        .filter-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .kpi-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .kpi-card {
            background: rgba(0, 201, 167, 0.15); border: 1px solid #00c9a7;
            padding: 20px; border-radius: 16px; text-align: center;
        }
        .kpi-title { font-size: 1rem; color: #ccffef; margin-bottom: 5px; }
        .kpi-value { font-size: 2.5rem; font-weight: bold; color: #fff; margin: 0; }
        
        .table-container { background: rgba(255,255,255,0.9); border-radius: 12px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; color: #000; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #0f766e; color: white; font-weight: bold; }
        tr:last-child td { border-bottom: none; }
        
        .preview { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .preview img { width: 90px; height: 90px; object-fit: cover; border-radius: 12px; border: 2px solid #00c9a7; }
        #status { text-align: center; font-weight: bold; color: #8fffe0; min-height: 1.5em; margin-top: 10px;}
    </style>
</head>
<body>

<div class="container">
    
    <!-- หน้าหลัก (Home) -->
    <div id="viewHome" class="view active">
        <h1>ระบบแจ้งจุดเสี่ยง<br>โรงงานอาหารสัตว์ศรีราชา</h1>
        <div style="margin-top: 40px;">
            <button class="btn-primary" onclick="switchView('viewForm')">🚧 พนักงานส่งจุดเสี่ยง</button>
            <button class="btn-secondary" onclick="switchView('viewLogin')">📊 รายงานสรุป (ผู้บริหาร)</button>
        </div>
    </div>

    <!-- หน้า Form แจ้งเหตุ (หน้าเดิม) -->
    <div id="viewForm" class="view">
        <h1>ส่งรายงานจุดเสี่ยง</h1>
        <div class="form-group"><label>หน่วยงาน</label><select id="department"><option value="">กำลังโหลด...</option></select></div>
        <div class="form-group"><label>ชื่อพนักงาน</label><select id="employee" disabled><option value="">เลือกพนักงาน</option></select></div>
        <div class="form-group"><label>จุดพบความเสี่ยง</label><textarea id="locationText" placeholder="แจ้งสถานที่หรือจุดเสี่ยง"></textarea></div>
        <div class="form-group"><label>ประเภทความเสี่ยง</label><select id="riskType"></select></div>
        <div class="form-group"><label>ระดับความเสี่ยง</label><select id="riskLevel"></select></div>
        <div class="form-group">
            <label>แนบรูปภาพ</label>
            <input type="file" id="images" multiple accept="image/*" />
            <div class="preview" id="preview"></div>
        </div>
        <div class="form-group"><label>หมายเหตุ</label><textarea id="note"></textarea></div>
        <button id="submitBtn" class="btn-primary">บันทึกข้อมูล</button>
        <button class="btn-secondary" onclick="switchView('viewHome')">ย้อนกลับ</button>
        <div id="status"></div>
    </div>

    <!-- หน้า Login สำหรับ Dashboard -->
    <div id="viewLogin" class="view">
        <h2>เข้าสู่ระบบรายงานสรุป</h2>
        <div class="form-group"><label>ชื่อผู้ใช้งาน (User)</label><input type="text" id="loginUser"></div>
        <div class="form-group"><label>รหัสผ่าน (Password)</label><input type="password" id="loginPass"></div>
        <button id="btnLogin" class="btn-primary">เข้าสู่ระบบ</button>
        <button class="btn-secondary" onclick="switchView('viewHome')">ย้อนกลับ</button>
        <div id="loginStatus" style="text-align: center; color: #ff8f8f; margin-top: 10px;"></div>
    </div>

    <!-- หน้า Dashboard -->
    <div id="viewDashboard" class="view">
        <h2>รายงานสรุปจุดเสี่ยงสะสม</h2>
        <div class="filter-row">
            <div><label>ปี ค.ศ.</label><select id="dashYear" onchange="renderDashboard()"></select></div>
            <div><label>หน่วยงาน</label><select id="dashDept" onchange="renderDashboard()"></select></div>
        </div>
        
        <div class="kpi-cards">
            <div class="kpi-card">
                <div class="kpi-title">จุดเสี่ยงรวม (ตามเงื่อนไข)</div>
                <div class="kpi-value" id="kpiTotal">0</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-title">พนักงานที่รายงาน (คน)</div>
                <div class="kpi-value" id="kpiPeople">0</div>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead><tr><th>ชื่อพนักงาน</th><th style="text-align: center;">จำนวนจุดเสี่ยง</th></tr></thead>
                <tbody id="dashTableBody"></tbody>
            </table>
        </div>
        
        <div style="margin-top: 20px;">
            <button class="btn-secondary" onclick="switchView('viewHome')">ออกจากระบบ (กลับหน้าหลัก)</button>
        </div>
    </div>

</div>

<script>
// *** ใส่ URL ใหม่ที่ได้จากการ Deploy ที่นี่ ***
const API_URL = "https://script.google.com/macros/s/AKfycbxptHmD6yIxaC2JjU6mMxyjhtXn1rDImWniRaNSqWk5oJYCQpCZBgSaJ-YR7NHP63Kx/exec";

let masterData = {};
let dashboardData = [];

// 1. ระบบจัดการหน้าจอ (SPA)
function switchView(viewId) {
    document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
    document.getElementById(viewId).classList.add('active');
    
    // รีเซ็ตข้อความแจ้งเตือนต่างๆ เมื่อเปลี่ยนหน้า
    document.getElementById('status').innerHTML = "";
    document.getElementById('loginStatus').innerHTML = "";
    document.getElementById('loginPass').value = "";
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// 2. โหลดข้อมูลเริ่มต้น (สำหรับ Form)
async function loadMasterData() {
    try {
        const response = await fetch(API_URL + "?action=master");
        const data = await response.json();
        if (data.success) { masterData = data; setupDropdowns(); }
    } catch (e) { console.error("Load failed", e); }
}

function setupDropdowns() {
    const dept = document.getElementById("department");
    dept.innerHTML = '<option value="">เลือกหน่วยงาน</option>';
    masterData.departments.forEach(d => dept.innerHTML += `<option value="${d}">${d}</option>`);
    dept.onchange = loadEmployees;

    const rt = document.getElementById("riskType");
    rt.innerHTML = '<option value="">เลือกประเภท</option>';
    masterData.riskTypes.forEach(r => rt.innerHTML += `<option value="${r}">${r}</option>`);

    const rl = document.getElementById("riskLevel");
    rl.innerHTML = '<option value="">เลือกระดับ</option>';
    masterData.riskLevels.forEach(r => rl.innerHTML += `<option value="${r}">${r}</option>`);
}

function loadEmployees() {
    const deptVal = document.getElementById("department").value;
    const emp = document.getElementById("employee");
    emp.innerHTML = '<option value="">เลือกพนักงาน</option>';
    if (!deptVal) { emp.disabled = true; return; }
    emp.disabled = false;
    masterData.staffs.filter(s => s.department === deptVal).forEach(s => {
        emp.innerHTML += `<option value="${s.name}" data-id="${s.empId}">${s.name}</option>`;
    });
}

// 3. ระบบส่งฟอร์ม (Form Submit)
// (ส่วนการบีบอัดรูปและส่งข้อมูลเดิม ทำงานปกติ)
document.getElementById("images").onchange = function() {
    const preview = document.getElementById("preview");
    preview.innerHTML = "";
    [...this.files].forEach(file => {
        const reader = new FileReader();
        reader.onload = e => {
            const img = document.createElement("img");
            img.src = e.target.result;
            preview.appendChild(img);
        };
        reader.readAsDataURL(file);
    });
};

async function compressAndGetBase64(file) {
    return new Promise(resolve => {
        const img = new Image();
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = e => img.src = e.target.result;
        img.onload = () => {
            const canvas = document.createElement("canvas");
            let w = img.width, h = img.height;
            if (w > 1200) { h *= 1200 / w; w = 1200; }
            canvas.width = w; canvas.height = h;
            canvas.getContext("2d").drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL("image/jpeg", 0.7).split(',')[1]);
        };
    });
}

document.getElementById("submitBtn").onclick = async function() {
    const btn = this;
    const status = document.getElementById("status");
    const empSelect = document.getElementById("employee");
    
    if (!empSelect.value || !document.getElementById("locationText").value || document.getElementById("images").files.length === 0) {
        alert("กรุณากรอกข้อมูลและแนบรูปภาพให้ครบถ้วน"); return;
    }

    btn.disabled = true; status.innerHTML = "⌛ กำลังบันทึกข้อมูลส่วนข้อความ...";
    try {
        const empId = empSelect.options[empSelect.selectedIndex].getAttribute("data-id");
        const d = new Date();
        const imageIdBase = empId + String(d.getDate()).padStart(2,'0') + String(d.getMonth()+1).padStart(2,'0') + String(d.getFullYear()).slice(-2);

        const resText = await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({
                action: "saveForm", reporter: empSelect.value, department: document.getElementById("department").value,
                location: document.getElementById("locationText").value, riskType: document.getElementById("riskType").value,
                riskLevel: document.getElementById("riskLevel").value, note: document.getElementById("note").value,
                totalImages: document.getElementById("images").files.length, imageId: imageIdBase
            })
        });
        const resultText = await resText.json();
        if (!resultText.success) throw new Error(resultText.error || resultText.message);
        
        const files = document.getElementById("images").files;
        for (let i = 0; i < files.length; i++) {
            status.innerHTML = `📸 กำลังอัปโหลดรูปที่ ${i+1}/${files.length}...`;
            const base64 = await compressAndGetBase64(files[i]);
            await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ action: "uploadImage", base64: base64, rowNumber: resultText.rowNumber, imageId: imageIdBase + "_" + (i+1) })
            });
        }
        
        alert("✅ บันทึกข้อมูลสำเร็จ");
        document.getElementById("locationText").value = ""; document.getElementById("note").value = "";
        document.getElementById("images").value = ""; document.getElementById("preview").innerHTML = "";
        document.getElementById("department").selectedIndex = 0; document.getElementById("employee").innerHTML = '<option value="">เลือกพนักงาน</option>';
        document.getElementById("employee").disabled = true; document.getElementById("riskType").selectedIndex = 0;
        document.getElementById("riskLevel").selectedIndex = 0; status.innerHTML = "";
        switchView('viewHome');

    } catch (err) {
        console.error(err);
        alert("❌ เกิดข้อผิดพลาด:\n" + err.message);
        status.innerHTML = "❌ บันทึกไม่สำเร็จ";
    } finally { btn.disabled = false; }
};

// 4. ระบบ Login
document.getElementById("btnLogin").onclick = async function() {
    const user = document.getElementById("loginUser").value;
    const pass = document.getElementById("loginPass").value;
    const stat = document.getElementById("loginStatus");
    const btn = this;

    if(!user || !pass) { stat.innerHTML = "กรุณากรอก User และ Password"; return; }
    
    btn.disabled = true; stat.innerHTML = "กำลังตรวจสอบ...";
    try {
        const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "checkLogin", user: user, pass: pass }) });
        const data = await res.json();
        if(data.success) {
            stat.innerHTML = "";
            await loadDashboardData();
            switchView('viewDashboard');
        } else {
            stat.innerHTML = data.message;
        }
    } catch(err) { stat.innerHTML = "เชื่อมต่อระบบขัดข้อง"; } finally { btn.disabled = false; }
};

// 5. ระบบ Dashboard
async function loadDashboardData() {
    document.getElementById("dashTableBody").innerHTML = '<tr><td colspan="2" style="text-align:center;">กำลังดึงข้อมูล...</td></tr>';
    try {
        const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "getDashboard" }) });
        const data = await res.json();
        if(data.success) {
            dashboardData = data.records;
            setupDashboardFilters();
            renderDashboard();
        }
    } catch(err) { console.error("Dashboard Load Error"); }
}

function setupDashboardFilters() {
    const yearSelect = document.getElementById("dashYear");
    const deptSelect = document.getElementById("dashDept");
    
    // หารายการปีทั้งหมดจากข้อมูล
    let years = [...new Set(dashboardData.map(d => d.year))].filter(y => y !== "N/A").sort().reverse();
    yearSelect.innerHTML = '<option value="all">รวมทุกปี</option>';
    years.forEach(y => yearSelect.innerHTML += `<option value="${y}" selected>${y}</option>`);

    // หารายการหน่วยงานทั้งหมด
    let depts = [...new Set(dashboardData.map(d => d.dept))].sort();
    deptSelect.innerHTML = '<option value="all">รวมทุกหน่วยงาน</option>';
    depts.forEach(d => deptSelect.innerHTML += `<option value="${d}">${d}</option>`);
}

function renderDashboard() {
    const selYear = document.getElementById("dashYear").value;
    const selDept = document.getElementById("dashDept").value;
    
    // กรองข้อมูลตามเงื่อนไข
    let filtered = dashboardData.filter(d => {
        let matchYear = (selYear === "all") || (d.year === selYear);
        let matchDept = (selDept === "all") || (d.dept === selDept);
        return matchYear && matchDept;
    });

    // นับจำนวนรวม และนับแยกรายบุคคล
    let empCounts = {};
    filtered.forEach(d => {
        if(!d.reporter) return;
        empCounts[d.reporter] = (empCounts[d.reporter] || 0) + 1;
    });

    // อัปเดตการ์ด KPI ด้านบน
    document.getElementById("kpiTotal").innerText = filtered.length;
    document.getElementById("kpiPeople").innerText = Object.keys(empCounts).length;

    // สร้างตารางพนักงานเรียงตามคนที่ส่งเยอะสุด
    let sortable = [];
    for (let emp in empCounts) sortable.push([emp, empCounts[emp]]);
    sortable.sort((a, b) => b[1] - a[1]);

    const tbody = document.getElementById("dashTableBody");
    tbody.innerHTML = "";
    if(sortable.length === 0) {
        tbody.innerHTML = '<tr><td colspan="2" style="text-align:center;">ไม่พบข้อมูลในปีหรือหน่วยงานที่เลือก</td></tr>';
        return;
    }

    sortable.forEach(item => {
        tbody.innerHTML += `<tr><td>${item[0]}</td><td style="text-align: center; font-weight: bold;">${item[1]}</td></tr>`;
    });
}

// โหลด Master Data ตอนเปิดหน้าเว็บครั้งแรก
window.onload = loadMasterData;
</script>
</body>
</html>
