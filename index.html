<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แจ้งจุดเสี่ยง | Risk Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14; --surface: #161920; --surface2: #1e2230;
    --border: #2a2f3d; --accent: #ff5c3a; --text: #e8eaf0;
    --text2: #8b90a0; --green: #2dd98f; --red: #ff4444;
    --yellow: #ffb830; --font: 'IBM Plex Sans Thai', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); padding: 16px; min-height: 100vh; }
  
  /* Background Pattern */
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(255,92,58,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,92,58,0.03) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }

  .container { max-width: 680px; margin: 0 auto; position: relative; z-index: 1; }
  .header { padding-bottom: 24px; border-bottom: 1px solid var(--border); margin-bottom: 28px; }
  .logo-box { width: 44px; height: 44px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
  
  .section { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 14px; }
  .section-label { font-size: 11px; font-family: var(--mono); color: var(--accent); letter-spacing: 1.5px; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; text-transform: uppercase; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .field label { font-size: 12px; color: var(--text2); }
  .field label span { color: var(--accent); }

  input, select, textarea { 
    background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; 
    padding: 10px; color: var(--text); width: 100%; outline: none; font-family: var(--font);
    transition: border-color 0.2s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }

  .risk-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .risk-btn { 
    padding: 12px 8px; border: 1px solid var(--border); border-radius: 7px; 
    background: var(--surface2); color: var(--text2); cursor: pointer; 
    text-align: center; font-size: 12px; transition: 0.2s;
  }
  .risk-btn.active { border-color: var(--accent); background: rgba(255,92,58,0.1); color: var(--accent); }

  .severity-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 8px; }
  .sev-btn { 
    padding: 8px 4px; border: 1px solid var(--border); border-radius: 7px; 
    background: var(--surface2); color: var(--text2); font-size: 11px; cursor: pointer; transition: 0.2s;
  }
  .sev-btn.active-low { border-color: var(--green); color: var(--green); background: rgba(45,217,143,0.1); }
  .sev-btn.active-med { border-color: var(--yellow); color: var(--yellow); background: rgba(255,184,48,0.1); }
  .sev-btn.active-high { border-color: var(--accent); color: var(--accent); background: rgba(255,92,58,0.1); }

  .upload-zone { 
    border: 1.5px dashed var(--border); padding: 24px; text-align: center; 
    border-radius: 8px; cursor: pointer; position: relative; transition: 0.2s;
  }
  .upload-zone:hover { border-color: var(--accent); background: rgba(255,92,58,0.02); }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

  .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; margin-top: 12px; }
  .preview-item { aspect-ratio: 1; border-radius: 7px; overflow: hidden; position: relative; border: 1px solid var(--border); }
  .preview-item img { width: 100%; height: 100%; object-fit: cover; }
  .remove-btn { 
    position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.7); 
    color: white; border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; 
  }

  .submit-btn { 
    width: 100%; padding: 14px; background: var(--accent); color: white; border: none; 
    border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; font-size: 15px;
    transition: 0.2s;
  }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .progress-wrap { margin-top: 15px; display: none; }
  .progress-bar { width: 100%; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--green); width: 0%; transition: 0.3s; }
  .status-msg { font-size: 12px; color: var(--text2); text-align: center; margin-top: 8px; font-family: var(--mono); }

  .success-overlay { 
    display: none; position: fixed; inset: 0; background: rgba(13,15,20,0.96); 
    z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(8px); 
  }
  .success-overlay.show { display: flex; }
  .success-box { background: var(--surface); border: 1px solid var(--green); padding: 40px; border-radius: 15px; text-align: center; max-width: 400px; width: 90%; }
</style>
</head>
<body>

<div class="container">
  <header class="header">
    <div class="logo-box">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    </div>
    <h1>แจ้งจุดเสี่ยง v2.0</h1>
    <div id="datetime" style="font-size:12px; color:var(--text2); margin-top:5px; font-family:var(--mono);"></div>
  </header>

  <form id="riskForm">
    <div class="section">
      <div class="section-label">01 — ข้อมูลผู้แจ้ง</div>
      <div class="grid-2">
        <div class="field">
          <label>หน่วยงาน/แผนก <span>*</span></label>
          <select id="dept" onchange="filterStaff()" required>
            <option value="">กำลังโหลดแผนก...</option>
          </select>
        </div>
        <div class="field">
          <label>ชื่อพนักงาน <span>*</span></label>
          <select id="reporter-name" required>
            <option value="">เลือกแผนกก่อน</option>
          </select>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">02 — สถานที่และเครื่องจักร</div>
      <div class="grid-2">
        <div class="field">
          <label>พื้นที่ <span>*</span></label>
          <select id="area" required>
            <option value="">เลือกพื้นที่</option>
            <option>โรงงาน A</option>
            <option>โรงงาน B</option>
            <option>คลังสินค้า</option>
            <option>พื้นที่จอดรถ</option>
          </select>
        </div>
        <div class="field">
          <label>เครื่องจักร / อุปกรณ์</label>
          <input type="text" id="machine" placeholder="ระบุเครื่องจักร">
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">03 — รายละเอียดความเสี่ยง</div>
      <div class="risk-grid" id="risk-btn-container">
        </div>
      <input type="hidden" id="riskType" required>
      
      <div style="margin-top:20px;">
        <label style="font-size:12px; color:var(--text2);">ระดับความรุนแรง <span>*</span></label>
        <div class="severity-row">
          <button type="button" class="sev-btn" data-val="ต่ำ" data-cls="active-low" onclick="selectSev(this)">🟢 ต่ำ</button>
          <button type="button" class="sev-btn" data-val="ปานกลาง" data-cls="active-med" onclick="selectSev(this)">🟡 กลาง</button>
          <button type="button" class="sev-btn" data-val="สูง" data-cls="active-high" onclick="selectSev(this)">🟠 สูง</button>
        </div>
        <input type="hidden" id="severity" value="ปานกลาง">
      </div>
    </div>

    <div class="section">
      <div class="section-label">04 — รูปภาพหลักฐาน</div>
      <div class="upload-zone">
        <input type="file" id="fileInput" accept="image/*" multiple>
        <p>📸 แตะเพื่อแนบรูป (สูงสุด 5 รูป)</p>
      </div>
      <div class="preview-grid" id="previewGrid"></div>
    </div>

    <div class="section">
      <div class="section-label">05 — หมายเหตุเพิ่มเติม</div>
      <textarea id="note" placeholder="รายละเอียดเพิ่มเติม..."></textarea>
    </div>

    <button type="submit" class="submit-btn" id="submitBtn">📤 ส่งรายงานเข้าระบบ</button>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <p class="status-msg" id="statusMsg"></p>
    </div>
  </form>
</div>

<div class="success-overlay" id="successOverlay">
  <div class="success-box">
    <div style="font-size:54px;">✅</div>
    <h2 style="margin-top:15px; color:var(--green);">บันทึกสำเร็จ</h2>
    <p style="margin-top:10px;">ข้อมูลและรูปภาพถูกส่งเข้าระบบเรียบร้อยแล้ว</p>
    <button onclick="location.reload()" style="margin-top:25px; padding:12px 30px; background:var(--green); border:none; border-radius:8px; cursor:pointer; font-weight:600; color: #000;">แจ้งเรื่องใหม่</button>
  </div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwkFw2GeZb8Gmn9sT7kdYNfZHKxo8JbXNi_DLUTAusqkgks3nKdBBJc7WVYvL7IUs03/exec';

let masterData = { departments: [], riskTypes: [], staffList: [] };
let imageFiles = [];

// 1. โหลดข้อมูลเริ่มต้น
window.onload = async () => {
  document.getElementById('datetime').textContent = new Date().toLocaleString('th-TH');
  try {
    const res = await fetch(APPS_SCRIPT_URL + '?action=getSettings');
    masterData = await res.json();
    
    // เติมแผนก
    const deptSelect = document.getElementById('dept');
    deptSelect.innerHTML = '<option value="">เลือกแผนก</option>' + 
      masterData.departments.map(d => `<option value="${d}">${d}</option>`).join('');
    
    // เติมปุ่มความเสี่ยง
    const riskContainer = document.getElementById('risk-btn-container');
    riskContainer.innerHTML = masterData.riskTypes.map(r => 
      `<button type="button" class="risk-btn" data-val="${r}" onclick="selectRisk(this)">${r}</button>`
    ).join('');
    
  } catch (e) {
    console.error(e);
    alert('ไม่สามารถดึงข้อมูลจาก Sheets ได้ กรุณาตรวจสอบการเชื่อมต่อ');
  }
};

// 2. กรองชื่อพนักงาน
function filterStaff() {
  const selectedDept = document.getElementById('dept').value;
  const staffSelect = document.getElementById('reporter-name');
  const filtered = masterData.staffList.filter(s => s.dept === selectedDept);
  
  staffSelect.innerHTML = '<option value="">เลือกชื่อพนักงาน</option>' + 
    filtered.map(s => `<option value="${s.name}" data-id="${s.id}">${s.name}</option>`).join('');
}

// 3. UI Selection Logic
function selectRisk(btn) {
  document.querySelectorAll('.risk-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('riskType').value = btn.dataset.val;
}

function selectSev(btn) {
  document.querySelectorAll('.sev-btn').forEach(b => b.className = 'sev-btn');
  btn.classList.add(btn.dataset.cls);
  document.getElementById('severity').value = btn.dataset.val;
}

// 4. จัดการรูปภาพ
document.getElementById('fileInput').onchange = e => {
  const files = Array.from(e.target.files);
  const remaining = 5 - imageFiles.length;
  files.slice(0, remaining).forEach(file => imageFiles.push(file));
  renderPreviews();
  e.target.value = '';
};

function renderPreviews() {
  const grid = document.getElementById('previewGrid');
  grid.innerHTML = '';
  imageFiles.forEach((file, i) => {
    const div = document.createElement('div');
    div.className = 'preview-item';
    const img = document.createElement('img');
    img.src = URL.createObjectURL(file);
    const btn = document.createElement('button');
    btn.className = 'remove-btn'; btn.innerHTML = '×'; btn.type = 'button';
    btn.onclick = () => { imageFiles.splice(i, 1); renderPreviews(); };
    div.append(img, btn); grid.append(div);
  });
}

async function resizeImage(file) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX_WIDTH = 1024;
      let width = img.width, height = img.height;
      if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      res(canvas.toDataURL('image/jpeg', 0.7).split(',')[1]);
    };
    img.src = URL.createObjectURL(file);
  });
}

// 5. Submit ข้อมูล
document.getElementById('riskForm').onsubmit = async e => {
  e.preventDefault();
  
  const reporterSelect = document.getElementById('reporter-name');
  const selectedStaffOption = reporterSelect.options[reporterSelect.selectedIndex];
  
  if (!reporterSelect.value || !document.getElementById('riskType').value) {
    alert('กรุณากรอกข้อมูลที่จำเป็นให้ครบถ้วน'); return;
  }

  const staffId = selectedStaffOption.dataset.id; // รหัสพนักงาน
  const btn = document.getElementById('submitBtn');
  const status = document.getElementById('statusMsg');
  const fill = document.getElementById('progressFill');

  btn.disabled = true;
  document.getElementById('progressWrap').style.display = 'block';

  try {
    // จังหวะที่ 1: บันทึก Form
    status.textContent = 'กำลังบันทึกข้อมูลฟอร์ม...';
    fill.style.width = '20%';

    const formData = {
      action: 'saveForm',
      reporter: reporterSelect.value,
      staffId: staffId,
      dept: document.getElementById('dept').value,
      area: document.getElementById('area').value,
      machine: document.getElementById('machine').value || '-',
      riskType: document.getElementById('riskType').value,
      severity: document.getElementById('severity').value,
      note: document.getElementById('note').value || '-',
      imageCount: imageFiles.length
    };

    const resForm = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(formData) });
    const resultForm = await resForm.json();
    if (resultForm.status !== 'ok') throw new Error('บันทึกฟอร์มล้มเหลว');

    const rowId = resultForm.rowId;

    // จังหวะที่ 2: อัปโหลดรูปทีละใบ
    for (let i = 0; i < imageFiles.length; i++) {
      status.textContent = `กำลังอัปโหลดรูปที่ ${i+1}/${imageFiles.length}...`;
      fill.style.width = `${20 + ((i + 1) / imageFiles.length * 75)}%`;
      
      const base64 = await resizeImage(imageFiles[i]);
      await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({
          action: 'saveImage',
          rowId: rowId,
          staffId: staffId,
          data: base64,
          index: i + 1
        })
      });
    }

    fill.style.width = '100%';
    status.textContent = 'บันทึกข้อมูลสำเร็จ!';
    setTimeout(() => {
      document.getElementById('successOverlay').classList.add('show');
    }, 500);

  } catch (err) {
    alert('เกิดข้อผิดพลาด: ' + err.message);
    btn.disabled = false;
    document.getElementById('progressWrap').style.display = 'none';
  }
};
</script>
</body>
</html>
