<div class="section">
  <div class="section-label">01 — ผู้แจ้ง</div>
  <div class="grid-2">
    <div class="field" id="f-dept">
      <label>หน่วยงาน *</label>
      <select id="dept" onchange="filterStaff()"><option value="">กำลังโหลดแผนก...</option></select>
    </div>
    <div class="field" id="f-name">
      <label>ชื่อพนักงาน *</label>
      <select id="reporter-name"><option value="">เลือกแผนกก่อน</option></select>
    </div>
  </div>
</div>

<div class="section">
  <div class="section-label">03 — ความเสี่ยง</div>
  <div class="risk-grid" id="risk-btn-container">
    </div>
  <input type="hidden" id="riskType">
  </div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz6p21K8gryQpyFxsBnd7ipRUPSUFtJ-8LAyirw-5xPHJ4LzPA2I21_VZOLGn2Z8Ilf/exec';
let masterData = { departments: [], riskTypes: [], staffList: [] };

// 1. โหลดข้อมูลจาก Sheets ทันทีที่เปิดหน้าเว็บ
window.onload = async () => {
  try {
    const res = await fetch(APPS_SCRIPT_URL + '?action=getSettings');
    masterData = await res.json();
    
    // เติมข้อมูลแผนก
    const deptSelect = document.getElementById('dept');
    deptSelect.innerHTML = '<option value="">เลือกแผนก</option>' + 
      masterData.departments.map(d => `<option value="${d}">${d}</option>`).join('');
    
    // สร้างปุ่มความเสี่ยง
    const riskContainer = document.getElementById('risk-btn-container');
    riskContainer.innerHTML = masterData.riskTypes.map(r => 
      `<button type="button" class="risk-btn" data-val="${r}" onclick="selectRisk(this)">${r}</button>`
    ).join('');
    
  } catch (e) { alert('ไม่สามารถโหลดข้อมูลเริ่มต้นได้'); }
};

// 2. ฟังก์ชันกรองรายชื่อพนักงานตามแผนก
function filterStaff() {
  const selectedDept = document.getElementById('dept').value;
  const staffSelect = document.getElementById('reporter-name');
  
  const filtered = masterData.staffList.filter(s => s.dept === selectedDept);
  staffSelect.innerHTML = '<option value="">เลือกชื่อพนักงาน</option>' + 
    filtered.map(s => `<option value="${s.name}" data-id="${s.id}">${s.name}</option>`).join('');
}

function selectRisk(btn) {
  document.querySelectorAll('.risk-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('riskType').value = btn.dataset.val;
}

// 3. ปรับฟังก์ชัน Submit ให้ส่งรหัสพนักงานไปด้วย
document.getElementById('riskForm').onsubmit = async e => {
  e.preventDefault();
  const reporterSelect = document.getElementById('reporter-name');
  const selectedStaffOption = reporterSelect.options[reporterSelect.selectedIndex];
  const staffId = selectedStaffOption.dataset.id; // ดึงรหัสพนักงาน

  if (!reporterSelect.value || !document.getElementById('riskType').value) {
    alert('กรุณาเลือกข้อมูลให้ครบถ้วน'); return;
  }

  // ... ส่วนการเตรียม UI และ Progress คงเดิม ...

  try {
    const formData = {
      action: 'saveForm',
      reporter: reporterSelect.value,
      staffId: staffId, // ส่งรหัสไปด้วย
      dept: document.getElementById('dept').value,
      area: document.getElementById('area').value,
      machine: document.getElementById('machine').value,
      riskType: document.getElementById('riskType').value,
      severity: document.getElementById('severity').value,
      note: document.getElementById('note').value,
      imageCount: imageFiles.length
    };

    const resForm = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(formData) });
    const resultForm = await resForm.json();
    const rowId = resultForm.rowId;

    // ส่งรูปแบบระบุรหัสพนักงานเพื่อนำไปตั้งชื่อไฟล์
    for (let i = 0; i < imageFiles.length; i++) {
      const base64 = await resizeImage(imageFiles[i]);
      await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({
          action: 'saveImage',
          rowId: rowId,
          staffId: staffId, // ส่งรหัสพนักงานเพื่อตั้งชื่อไฟล์
          data: base64,
          index: i + 1
        })
      });
    }
    // ... ส่วนแสดง Success Overlay ...
  } catch (err) { /* Error Handling */ }
};
</script>
