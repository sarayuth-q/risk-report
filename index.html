<script>
document.addEventListener('DOMContentLoaded', function () {

// โค้ดทั้งหมดของคุณ
// ทั้งหมดตั้งแต่ updateClock()
// จนถึง resetForm()
// ---- Datetime ----
function updateClock() {
  const now = new Date();
  const d = now.toLocaleDateString('th-TH', { day:'2-digit', month:'2-digit', year:'numeric' });
  const t = now.toLocaleTimeString('th-TH', { hour:'2-digit', minute:'2-digit' });
  document.getElementById('datetime').textContent = d + ' ' + t;
}
updateClock();
setInterval(updateClock, 30000);

// ---- Risk type buttons ----
document.querySelectorAll('.risk-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.risk-btn').forEach(b => b.classList.remove('active','yellow','red'));
    btn.classList.add('active');
    const c = btn.dataset.color;
    if (c) btn.classList.add(c);
    document.getElementById('riskType').value = btn.dataset.val;
    document.getElementById('riskTypeError').style.display = 'none';
  });
});

// ---- Severity buttons ----
document.querySelectorAll('.sev-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sev-btn').forEach(b => {
      b.className = 'sev-btn';
    });
    btn.classList.add(btn.dataset.cls);
    document.getElementById('severity').value = btn.dataset.val;
    document.getElementById('sevError').style.display = 'none';
  });
});

// ---- Image handling ----
let imageFiles = [];

function compressImage(file, maxPx = 800, quality = 0.75) {
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);

    img.onload = () => {
      URL.revokeObjectURL(url);

      let { width, height } = img;

      const needsResize = width > maxPx || height > maxPx;

      if (!needsResize) {
        resolve({
          blob: file,
          compressed: false,
          size: file.size
        });
        return;
      }

      const ratio = Math.min(maxPx / width, maxPx / height);

      width = Math.round(width * ratio);
      height = Math.round(height * ratio);

      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;

      canvas.getContext('2d').drawImage(img, 0, 0, width, height);

      canvas.toBlob(blob => {
        resolve({
          blob,
          compressed: true,
          size: blob.size
        });
      }, 'image/jpeg', quality);
    };

    img.src = url;
  });
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + 'KB';
  return (bytes / (1024 * 1024)).toFixed(1) + 'MB';
}

function renderPreviews() {
  const grid = document.getElementById('previewGrid');
  grid.innerHTML = '';

  imageFiles.forEach((f, i) => {

    const div = document.createElement('div');
    div.className = 'preview-item';

    const imgEl = document.createElement('img');
    imgEl.src = URL.createObjectURL(f.blob);

    const removeBtn = document.createElement('button');
    removeBtn.className = 'remove-btn';
    removeBtn.innerHTML = '×';
    removeBtn.type = 'button';

    removeBtn.onclick = () => {
      imageFiles.splice(i, 1);
      renderPreviews();
    };

    const badge = document.createElement('div');
    badge.className = 'size-badge';
    badge.textContent = formatSize(f.size);

    div.appendChild(imgEl);
    div.appendChild(removeBtn);
    div.appendChild(badge);

    grid.appendChild(div);
  });
}

document.getElementById('fileInput').addEventListener('change', async function() {

  const files = Array.from(this.files);

  const remaining = 5 - imageFiles.length;

  const toProcess = files.slice(0, remaining);

  if (files.length > remaining) {
    showToast('เพิ่มได้สูงสุด 5 ภาพ');
  }

  let anyCompressed = false;

  for (const file of toProcess) {

    const result = await compressImage(file);

    if (result.compressed) anyCompressed = true;

    imageFiles.push(result);
  }

  renderPreviews();

  const note = document.getElementById('compressNote');

  if (anyCompressed) {
    note.classList.add('visible');
  }

  this.value = '';
});

// Drag & drop
const zone = document.getElementById('uploadZone');

zone.addEventListener('dragover', e => {
  e.preventDefault();
  zone.classList.add('dragover');
});

zone.addEventListener('dragleave', () => {
  zone.classList.remove('dragover');
});

zone.addEventListener('drop', async e => {

  e.preventDefault();

  zone.classList.remove('dragover');

  const files = Array.from(e.dataTransfer.files)
    .filter(f => f.type.startsWith('image/'));

  const remaining = 5 - imageFiles.length;

  for (const file of files.slice(0, remaining)) {

    const result = await compressImage(file);

    if (result.compressed) {
      document.getElementById('compressNote').classList.add('visible');
    }

    imageFiles.push(result);
  }

  renderPreviews();
});

// ---- Char counter ----
function updateCounter() {
  const val = document.getElementById('note').value.length;
  document.getElementById('charCounter').textContent = val + ' / 500';
}

// ---- Toast ----
function showToast(msg) {

  const t = document.getElementById('toast');

  t.textContent = msg;

  t.classList.add('show');

  setTimeout(() => {
    t.classList.remove('show');
  }, 2500);
}

// ---- Validation ----
function validate() {

  let ok = true;

  const checks = [
    { id: 'reporter-name', field: 'f-name', msg: 'กรุณากรอกชื่อ' },
    { id: 'dept', field: 'f-dept', msg: 'กรุณาเลือกหน่วยงาน' },
    { id: 'area', field: 'f-area', msg: 'กรุณาเลือกพื้นที่' },
  ];

  checks.forEach(c => {

    const el = document.getElementById(c.id);

    const field = document.getElementById(c.field);

    if (!el.value.trim()) {

      field.classList.add('error');

      field.querySelector('.field-error').textContent = c.msg;

      ok = false;

    } else {

      field.classList.remove('error');
    }
  });

  if (!document.getElementById('riskType').value) {
    document.getElementById('riskTypeError').style.display = 'block';
    ok = false;
  }

  if (!document.getElementById('severity').value) {
    document.getElementById('sevError').style.display = 'block';
    ok = false;
  }

  return ok;
}

// ======================================================
// SUBMIT
// ======================================================

document.getElementById('riskForm').addEventListener('submit', async function(e) {

  e.preventDefault();

  if (!validate()) {
    showToast('กรุณากรอกข้อมูลที่จำเป็นให้ครบ');
    return;
  }

  const btn = document.getElementById('submitBtn');
  const spinner = document.getElementById('spinner');
  const icon = document.getElementById('submitIcon');

  btn.disabled = true;
  spinner.style.display = 'block';
  icon.style.display = 'none';

  const payload = {
    timestamp: new Date().toISOString(),
    reporter: document.getElementById('reporter-name').value.trim(),
    dept: document.getElementById('dept').value,
    area: document.getElementById('area').value,
    machine: document.getElementById('machine').value.trim(),
    riskType: document.getElementById('riskType').value,
    severity: document.getElementById('severity').value,
    note: document.getElementById('note').value.trim(),
    imageCount: imageFiles.length,
  };

  // URL Apps Script
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzlXKFPGbU-Rcn9lnqCkXOv2UH5mjly3lNF2fkj4nb93SlSKcYh3hyJDnzjaLkjsZFi/exec';

  try {

    const formData = new FormData();

    formData.append('data', JSON.stringify(payload));

    imageFiles.forEach((f, i) => {
      formData.append(
        'image_' + i,
        f.blob,
        'img_' + i + '.jpg'
      );
    });

    const response = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: formData
    });

    const resultText = await response.text();

    console.log('SERVER RESPONSE:', resultText);

    if (!response.ok) {
      throw new Error('Upload failed');
    }

    const ref = 'RSK-' + Date.now().toString(36).toUpperCase().slice(-8);

    document.getElementById('refCode').textContent = ref;

    document.getElementById('successOverlay').classList.add('show');

  } catch (err) {

    console.error(err);

    showToast('อัปโหลดไม่สำเร็จ กรุณาตรวจสอบ Apps Script');

    btn.disabled = false;

    spinner.style.display = 'none';

    icon.style.display = '';
  }
});

// ---- Reset ----
function resetForm() {

  document.getElementById('riskForm').reset();

  document.getElementById('riskType').value = '';
  document.getElementById('severity').value = '';

  document.querySelectorAll('.risk-btn')
    .forEach(b => b.classList.remove('active','yellow','red'));

  document.querySelectorAll('.sev-btn')
    .forEach(b => b.className = 'sev-btn');

  imageFiles = [];

  renderPreviews();

  document.getElementById('previewGrid').innerHTML = '';

  document.getElementById('compressNote')
    .classList.remove('visible');

  document.getElementById('charCounter')
    .textContent = '0 / 500';

  document.querySelectorAll('.field')
    .forEach(f => f.classList.remove('error'));

  document.getElementById('riskTypeError').style.display = 'none';

  document.getElementById('sevError').style.display = 'none';

  document.getElementById('submitBtn').disabled = false;

  document.getElementById('spinner').style.display = 'none';

  document.getElementById('submitIcon').style.display = '';

  document.getElementById('successOverlay').classList.remove('show');

  window.scrollTo({
    top: 0,
    behavior: 'smooth'
  });
  
});
</script>
