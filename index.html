<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายงานจุดเสี่ยง โรงงานอาหารสัตว์ศรีราชา</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SweetAlert2 สำหรับแจ้งเตือนสวยๆ -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #064E3B 0%, #000000 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: #1e293b;
        }
        .glass-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 1.25rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        .form-label {
            font-weight: 500;
            font-size: 1.125rem; /* ขนาดใหญ่ชัดเจน */
            color: #0f172a;
            margin-bottom: 0.5rem;
            display: block;
        }
        .form-input {
            width: 100%;
            padding: 0.875rem;
            border: 1px solid #cbd5e1;
            border-radius: 0.75rem;
            font-size: 1.125rem;
            transition: all 0.3s;
            background-color: #f8fafc;
        }
        .form-input:focus {
            border-color: #0d5c50;
            outline: none;
            box-shadow: 0 0 0 3px rgba(13, 92, 80, 0.2);
            background-color: #ffffff;
        }
        .required::after {
            content: " *";
            color: #ef4444;
        }
        .btn-submit {
            background: linear-gradient(to right, #0d5c50, #047857);
            color: white;
            font-size: 1.25rem;
            font-weight: 600;
            padding: 1rem;
            border-radius: 0.75rem;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(13, 92, 80, 0.4);
        }
    </style>
</head>
<body class="p-4 md:p-8 flex justify-center items-center">

    <div class="glass-container w-full max-w-3xl p-6 md:p-10">
        <div class="text-center mb-8">
            <h1 class="text-2xl md:text-3xl font-semibold text-teal-900 mb-2">รายงานจุดเสี่ยง</h1>
            <h2 class="text-xl md:text-2xl font-medium text-gray-700">โรงงานอาหารสัตว์ศรีราชา</h2>
            <div class="w-16 h-1 bg-teal-600 mx-auto mt-4 rounded"></div>
        </div>

        <form id="riskForm" onsubmit="submitForm(event)">
            
            <!-- ชุดข้อมูลที่ 1: ผู้แจ้ง -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="form-label required" for="department">หน่วยงาน</label>
                    <select id="department" class="form-input" required onchange="filterStaff()">
                        <option value="">-- เลือกหน่วยงาน --</option>
                    </select>
                </div>
                <div>
                    <label class="form-label required" for="staffName">ชื่อพนักงาน</label>
                    <select id="staffName" class="form-input" required disabled>
                        <option value="">-- กรุณาเลือกหน่วยงานก่อน --</option>
                    </select>
                </div>
            </div>

            <!-- ชุดข้อมูลที่ 2: สถานที่ -->
            <div class="mb-6">
                <label class="form-label required" for="location">สถานที่ / จุดพบความเสี่ยง</label>
                <input type="text" id="location" class="form-input" placeholder="แจ้งสถานที่หรือจุดเสี่ยง" required>
            </div>

            <!-- ชุดข้อมูลที่ 3 & 4: ประเภทและระดับความเสี่ยง -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="form-label required" for="riskType">ประเภทความเสี่ยง</label>
                    <select id="riskType" class="form-input" required>
                        <option value="">-- เลือกประเภท --</option>
                    </select>
                </div>
                <div>
                    <label class="form-label required" for="riskLevel">ระดับความเสี่ยง</label>
                    <select id="riskLevel" class="form-input" required>
                        <option value="">-- เลือกระดับ --</option>
                    </select>
                </div>
            </div>

            <!-- ชุดข้อมูลที่ 5: แนบภาพถ่าย -->
            <div class="mb-6">
                <label class="form-label required" for="images">แนบภาพถ่าย (ระบบจะบีบอัดให้อัตโนมัติ)</label>
                <input type="file" id="images" class="form-input" accept="image/*" multiple required capture="environment">
                <p class="text-sm text-gray-500 mt-2">* เลือกจากอัลบั้มหรือถ่ายภาพใหม่ได้</p>
            </div>

            <!-- ชุดข้อมูลที่ 6: หมายเหตุ -->
            <div class="mb-8">
                <label class="form-label" for="remarks">หมายเหตุ (ถ้ามี)</label>
                <textarea id="remarks" class="form-input" rows="3" placeholder="ระบุข้อมูลเพิ่มเติม..."></textarea>
            </div>

            <button type="submit" id="submitBtn" class="btn-submit">
                บันทึกข้อมูล
            </button>
        </form>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyylZ0FfpPWqZj-Rl-dLDlWF3NonI9qz8-b1col2ShyMfsAcgXtEHDP218ixxDCRnlw/exec";
        let staffData = [];

        // โหลดข้อมูลตั้งต้น (Dropdown) เมื่อเปิดหน้าเว็บ
        window.onload = async () => {
            Swal.fire({ title: 'กำลังโหลดข้อมูล...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
            try {
                const response = await fetch(`${SCRIPT_URL}?action=getInitialData`);
                const data = await response.json();
                
                // นำข้อมูลเข้า Dropdown
                populateDropdown('department', [...new Set(data.staff.map(s => s.dept))]);
                populateDropdown('riskType', data.riskTypes);
                populateDropdown('riskLevel', data.riskLevels);
                staffData = data.staff;
                Swal.close();
            } catch (error) {
                Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้ กรุณาลองใหม่', 'error');
            }
        };

        function populateDropdown(id, items) {
            const select = document.getElementById(id);
            items.filter(item => item).forEach(item => {
                let option = document.createElement('option');
                option.value = item;
                option.textContent = item;
                select.appendChild(option);
            });
        }

        // กรองชื่อพนักงานตามหน่วยงาน
        function filterStaff() {
            const dept = document.getElementById('department').value;
            const staffSelect = document.getElementById('staffName');
            staffSelect.innerHTML = '<option value="">-- เลือกชื่อพนักงาน --</option>';
            
            if (dept) {
                staffSelect.disabled = false;
                const filtered = staffData.filter(s => s.dept === dept);
                filtered.forEach(s => {
                    let option = document.createElement('option');
                    option.value = s.name;
                    option.dataset.code = s.code; // เก็บค่ารหัสพนักงานซ่อนไว้
                    option.textContent = s.name;
                    staffSelect.appendChild(option);
                });
            } else {
                staffSelect.disabled = true;
            }
        }

        // ฟังก์ชันบีบอัดรูปภาพด้วย HTML5 Canvas 
        function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = event => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_SIZE = 1200; // ย่อขนาดเพื่อไม่ให้เกิน 5MB แน่นอน
                        let width = img.width;
                        let height = img.height;

                        if (width > height && width > MAX_SIZE) {
                            height *= MAX_SIZE / width;
                            width = MAX_SIZE;
                        } else if (height > MAX_SIZE) {
                            width *= MAX_SIZE / height;
                            height = MAX_SIZE;
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // บีบอัดเป็น JPEG คุณภาพ 70%
                        const base64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
                        resolve({ filename: file.name, base64: base64 });
                    };
                };
            });
        }

        // ระบบแบ่งส่งข้อมูล (Chunking)
        async function submitForm(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;

            try {
                // 1. ดึงรหัสพนักงาน และ สร้าง Image ID
                const staffSelect = document.getElementById('staffName');
                const selectedOption = staffSelect.options[staffSelect.selectedIndex];
                const staffCode = selectedOption.dataset.code;

                const d = new Date();
                const dd = String(d.getDate()).padStart(2, '0');
                const mm = String(d.getMonth() + 1).padStart(2, '0');
                const yy = String(d.getFullYear()).slice(-2);
                const imageID = `${staffCode}${dd}${mm}${yy}`;

                // 2. เตรียมไฟล์ภาพ
                const fileInput = document.getElementById('images');
                const files = Array.from(fileInput.files);
                if (files.length === 0) throw new Error("กรุณาแนบภาพ");

                Swal.fire({ title: 'กำลังบีบอัดรูปภาพ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                const processedImages = await Promise.all(files.map(file => compressImage(file)));

                // 3. ส่งข้อมูล Text ไปจองแถวใน Sheet ก่อน (Step 1)
                Swal.fire({ title: 'กำลังบันทึกข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                
                const formData = {
                    action: "submitText",
                    reporter: selectedOption.value,
                    department: document.getElementById('department').value,
                    location: document.getElementById('location').value,
                    riskType: document.getElementById('riskType').value,
                    riskLevel: document.getElementById('riskLevel').value,
                    remarks: document.getElementById('remarks').value,
                    imageCount: files.length,
                    imageID: imageID
                };

                const textResponse = await fetch(SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify(formData)
                });
                const textResult = await textResponse.json();

                if (textResult.status !== "success") throw new Error(textResult.message);
                const rowId = textResult.rowId;

                // 4. ทยอยส่งภาพตามไปทีละภาพ (Step 2 - Chunking)
                for (let i = 0; i < processedImages.length; i++) {
                    Swal.fire({ title: `กำลังอัปโหลดรูปภาพ ${i + 1}/${processedImages.length}...`, allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                    
                    const imgPayload = {
                        action: "uploadImage",
                        rowId: rowId,
                        imageID: imageID,
                        filename: `${imageID}_${i+1}.jpg`,
                        base64: processedImages[i].base64,
                        isLast: (i === processedImages.length - 1)
                    };

                    await fetch(SCRIPT_URL, {
                        method: "POST",
                        body: JSON.stringify(imgPayload)
                    });
                }

                // 5. เสร็จสิ้น
                Swal.fire('สำเร็จ!', 'บันทึกข้อมูลและรูปภาพเรียบร้อยแล้ว', 'success').then(() => {
                    document.getElementById('riskForm').reset();
                    filterStaff();
                });

            } catch (error) {
                console.error(error);
                Swal.fire('ข้อผิดพลาด', 'เกิดปัญหาในการบันทึก: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
